                    <p style={{ fontSize:11, color:'#b2bec3', margin:'0 0 10px' }}>Full DDL authoring is on you — this is passed through to Kinetica verbatim.</p>
                </div>
            ) : (
                <div>
                    <CreateHelperPanel
                        graphGrammar={graphGrammar} tables={tables}
                        tableColumnsCache={tableColumnsCache} onFetchTableColumns={onFetchTableColumns}
                        onRegisterFile={onRegisterFile} graphEngine={graphEngine}
                        graphName={createGraphName} setGraphName={setCreateGraphName}
                        initialMode="recreate" buildTarget="spec"
                        onGenerate={function(model){ handleBuildFromModel(model); }}
                    />
                    <p style={{ fontSize:11, color:'#b2bec3', margin:'14px 0 6px', borderTop:'1px solid #eee', paddingTop:10 }}>Or author the node/edge mapping manually:</p>
                    <div style={row}>
                        <div style={col}>
                            <Label>Node table</Label>
                            <input style={inp} value={createNodeTable} onChange={function(e){ setCreateNodeTable(e.target.value); }} />
                        </div>
                        <div style={col}>
                            <Label>Node file (Parquet)</Label>
                            <input style={inp} value={createNodeFile} onChange={function(e){ setCreateNodeFile(e.target.value); }} />
                        </div>
                    </div>
                    <Label>Node SQL</Label>
                    <textarea style={sqlBox} value={createNodeSql} onChange={function(e){ setCreateNodeSql(e.target.value); }} spellCheck="false" />
                    <div style={row}>
                        <div style={col}><Label>Node id column</Label><input style={inp} value={createNodeIdCol} onChange={function(e){ setCreateNodeIdCol(e.target.value); }} /></div>
                        <div style={col}><Label>Node label column</Label><input style={inp} value={createNodeLabelCol} onChange={function(e){ setCreateNodeLabelCol(e.target.value); }} /></div>
                    </div>
                    <Label>Node properties (comma-separated)</Label>
                    <input style={inp} value={createNodeProps} onChange={function(e){ setCreateNodeProps(e.target.value); }} />

                    <div style={row}>
                        <div style={col}>
                            <Label>Edge table</Label>
                            <input style={inp} value={createEdgeTable} onChange={function(e){ setCreateEdgeTable(e.target.value); }} />
                        </div>
                        <div style={col}>
                            <Label>Edge file (Parquet)</Label>
                            <input style={inp} value={createEdgeFile} onChange={function(e){ setCreateEdgeFile(e.target.value); }} />
                        </div>
                    </div>
                    <Label>Edge SQL</Label>
                    <textarea style={sqlBox} value={createEdgeSql} onChange={function(e){ setCreateEdgeSql(e.target.value); }} spellCheck="false" />
                    <div style={row}>
                        <div style={col}><Label>Edge id column</Label><input style={inp} value={createEdgeIdCol} onChange={function(e){ setCreateEdgeIdCol(e.target.value); }} /></div>
                        <div style={col}><Label>Edge source column</Label><input style={inp} value={createEdgeSrcCol} onChange={function(e){ setCreateEdgeSrcCol(e.target.value); }} /></div>
                        <div style={col}><Label>Edge target column</Label><input style={inp} value={createEdgeTgtCol} onChange={function(e){ setCreateEdgeTgtCol(e.target.value); }} /></div>
                        <div style={col}><Label>Edge type column</Label><input style={inp} value={createEdgeTypeCol} onChange={function(e){ setCreateEdgeTypeCol(e.target.value); }} /></div>
                    </div>
                </div>
            )}

            <button onClick={handleCreate} disabled={status.loading || !createGraphName} style={{
                marginTop:6, padding:'11px 22px', border:'none', borderRadius:6, cursor: (status.loading || !createGraphName) ? 'not-allowed' : 'pointer',
                fontWeight:700, color:'#fff', fontSize:13, fontFamily:'inherit',
                background: (status.loading || !createGraphName) ? '#74b9ff' : 'linear-gradient(135deg,#0984e3,#0872c4)', transition:'0.2s',
            }}>{status.loading ? 'Creating…' : 'Create / Replace graph'}</button>
            {status.loading && <p style={{ marginTop:10, fontSize:12, color:'#636e72' }}>Creating… (this can take ~30s for a large graph)</p>}
            {!status.loading && status.text && <p style={{ marginTop:10, fontSize:12, color: status.error ? '#d63031' : '#00b894', fontWeight:600 }}>{status.text}</p>}
            </React.Fragment>)}
        </div>
    );
}

/* ═══════════════════ ExtractPanel ═════════════════════════
   PDF/text → LLM entity+relationship extraction → MERGE into a named graph
   (gwClient.extract → POST /extract, multipart). File input wins over the
   paste textarea when both are present. On success, offers one-click
   handoff into Visualize/Ontology on the freshly-built graph (mirrors
   ListPanel's onSelectGraph handoff: setActiveGraph + refresh the graph
   list + setActiveAction). */
// Stable string hash (djb2 variant) — used to key pasted-text extract
// sources so re-pasting identical text is recognized as a no-op.
function _extractKey(s){ var h=5381, i=s.length; while(i){ h=(h*33)^s.charCodeAt(--i); } return 'h'+(h>>>0).toString(16); }

function ExtractPanel(props) {
    var gwClient = props.gwClient, setGraphs = props.setGraphs;
    var setActiveGraph = props.setActiveGraph, setActiveAction = props.setActiveAction;
    var extractSources = props.extractSources || []; var setExtractSources = props.setExtractSources;
    var onGraphUpdated = props.onGraphUpdated || function(){};
    var graphEngine = props.graphEngine;

    const [file, setFile] = useState(null);
    const [pasteText, setPasteText] = useState('');
    // Target graph name is lifted into App state (props.extractGraph /
    // props.setExtractGraph) so it survives a session load — a local
    // useState here would reset to the default and hide sources that were
    // saved under a different graph name.
    var graphName = props.extractGraph || 'extracted_graph';
    var setGraphName = props.setExtractGraph || function(){};
    const [hint, setHint] = useState('');
    const [busy, setBusy] = useState(false);
    const [error, setError] = useState(null);
    const [noop, setNoop] = useState(null);
    const [result, setResult] = useState(null); // {graph, entities, relations, entities_new, relations_new, labels, truncated}

    var inp = { width:'100%', padding:'9px 11px', border:'1px solid #dfe6e9', borderRadius:6, boxSizing:'border-box', fontSize:13, marginBottom:10, background:'#fff', outline:'none', fontFamily:'inherit' };
    var textBox = Object.assign({}, inp, { fontFamily:'inherit', fontSize:13, minHeight:120, resize:'vertical' });
    var chip = { display:'inline-flex', alignItems:'center', padding:'3px 10px', borderRadius:12, fontSize:11, fontWeight:700, background:'#eef2f7', color:'#2d3436', marginRight:6, marginBottom:6 };

    var handleExtract = async function() {
        if (!gwClient || !graphName || busy) return;
        var payload = file || pasteText;
        if (!payload) return;
        setNoop(null);

        // Identify this source so an identical re-push (same graph, same
        // file/text) is a no-op — skip the network/LLM call entirely.
        var isFile = !!file;
        var srcKey = isFile ? ('f|'+file.name+'|'+file.size+'|'+file.lastModified) : _extractKey(pasteText || '');
        var srcLabel = isFile ? file.name : ((pasteText||'').slice(0,80) + ((pasteText||'').length>80?'…':''));
        var already = extractSources.some(function(s){ return s.graph === graphName && (s.engine === graphEngine || !s.engine) && s.key === srcKey; });
        if (already && props.buildMode !== 'recreate') {
            setError(null);
            setNoop('This source was already added to ' + graphName + ' — skipped (no new extraction).');
            return;
        }

        setBusy(true); setError(null); setResult(null);
        if (props.buildMode === 'recreate') {
            if (!window.confirm('Recreate "' + graphName + '"? This deletes the existing graph, then rebuilds it from this document.')) {
                setBusy(false);
                return;
            }
            // Idempotent: a missing graph is fine — the extract below rebuilds it.
            try { await gwClient.deleteGraph(graphName); } catch (e) { /* best effort */ }
        }
        try {
            var res = await gwClient.extract(graphName, payload, hint);
            if (res && res.status === 'error') throw new Error(res.message || 'extract failed');
            setResult(res);
            if (setExtractSources) {
                setExtractSources(function(prev){
                    return prev.concat([{
                        graph: graphName, kind: isFile ? 'file' : 'text', label: srcLabel, key: srcKey,
                        engine: graphEngine,
                        entities: res.entities, relations: res.relations, ts: new Date().toISOString(),
                    }]);
                });
            }
            // Force the built graph's ontology/viz fresh immediately — covers
            // extract-into-the-SAME-graph, where activeGraph's value doesn't
            // change so a plain setActiveGraph wouldn't trigger a refresh.
            onGraphUpdated(res.graph);
        } catch (err) {
            setError((err && err.message) || String(err));
        } finally {
            setBusy(false);
        }
    };

    var jumpTo = async function(action) {
        if (!result || !result.graph) return;
        onGraphUpdated(result.graph);
        try { setGraphs(await gwClient.listGraphs()); } catch (e) { /* best effort */ }
        setActiveAction(action);
    };

    // Sources for the CURRENT (graphName, graphEngine) only — the same graph
    // name can exist on a different engine with entirely different content,
    // so filter by both, not just graph. Legacy entries saved before engine
    // was recorded (no s.engine) still match via the `|| !s.engine` tolerance.
    var currentSources = extractSources.filter(function(s){
        return s.graph === graphName && (s.engine === graphEngine || !s.engine);
    });

    return (
        <div style={{ width:680, maxWidth:'100%', textAlign:'left', background:'#fff', border:'1px solid #dfe6e9', borderRadius:10, padding:24, boxShadow:'0 2px 8px rgba(0,0,0,0.04)' }}>
            <h2 style={{ fontWeight:700, fontSize:18, margin:'0 0 4px', color:'#2d3436' }}>Extract</h2>
            <p style={{ fontSize:12, color:'#b2bec3', margin:'0 0 16px' }}>PDF/text → LLM entity+relationship extraction → MERGE into a graph.</p>

            <Label>File (.pdf, .txt, .md)</Label>
            <input type="file" accept=".pdf,.txt,.md,.markdown" onChange={function(e){ setFile((e.target.files && e.target.files[0]) || null); }} style={{ marginBottom:10, fontSize:13 }} />

            <Label>Or paste text</Label>
            <textarea style={textBox} value={pasteText} onChange={function(e){ setPasteText(e.target.value); }} placeholder="Paste document text here (used only if no file is chosen)…" spellCheck="false" disabled={!!file} />
            {!!file && <p style={{ fontSize:11, color:'#b2bec3', margin:'-6px 0 10px' }}>File selected ({file.name}) — it takes priority over pasted text.</p>}

            <Label>Target graph name</Label>
            <input style={inp} value={graphName} onChange={function(e){ setGraphName(e.target.value); }} placeholder="extracted_graph" />

            <Label>Focus / hint (optional)</Label>
            <input style={inp} value={hint} onChange={function(e){ setHint(e.target.value); }} placeholder="e.g. focus on organizations and people" />

            <button onClick={handleExtract} disabled={busy || !graphName || !(file || pasteText.trim())} style={{
                marginTop:6, padding:'11px 22px', border:'none', borderRadius:6,
                cursor: (busy || !graphName || !(file || pasteText.trim())) ? 'not-allowed' : 'pointer',
                fontWeight:700, color:'#fff', fontSize:13, fontFamily:'inherit',
                background: (busy || !graphName || !(file || pasteText.trim())) ? '#74b9ff' : 'linear-gradient(135deg,#0984e3,#0872c4)', transition:'0.2s',
            }}>{busy ? 'Extracting…' : (props.buildMode === 'recreate' ? 'Recreate & Build' : 'Extract & Build')}</button>
            {busy && <p style={{ marginTop:10, fontSize:12, color:'#636e72' }}>Extracting… this can take a while (LLM pass per chunk).</p>}
            {!busy && error && <p style={{ marginTop:10, fontSize:12, color:'#d63031', fontWeight:600 }}>{error}</p>}
            {!busy && !error && noop && <p style={{ marginTop:10, fontSize:12, color:'#636e72', fontWeight:600 }}>{noop}</p>}

            {!busy && result && (
                <div style={{ marginTop:16, background:'#eef7ff', border:'1px solid #cbe4fb', borderRadius:8, padding:14 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:'#2d3436', marginBottom:8 }}>
                        Built <b>{result.graph}</b> — {result.entities || 0} entities{result.entities_new != null ? ' (' + result.entities_new + ' new)' : ''}, {result.relations || 0} relationships{result.relations_new != null ? ' (' + result.relations_new + ' new)' : ''}
                    </div>
                    {!!(result.labels && result.labels.node_labels && result.labels.node_labels.length) && (
                        <div style={{ marginBottom:6 }}>
                            <span style={{ fontSize:10, fontWeight:700, color:'#636e72', textTransform:'uppercase', marginRight:6 }}>Node labels:</span>
                            {result.labels.node_labels.map(function(l, i) { return <span key={'nl_' + i} style={chip}>{l}</span>; })}
                        </div>
                    )}
                    {!!(result.labels && result.labels.edge_labels && result.labels.edge_labels.length) && (
                        <div style={{ marginBottom:6 }}>
                            <span style={{ fontSize:10, fontWeight:700, color:'#636e72', textTransform:'uppercase', marginRight:6 }}>Edge labels:</span>
                            {result.labels.edge_labels.map(function(l, i) { return <span key={'el_' + i} style={Object.assign({}, chip, { background:'#dff9f2', color:'#00895c' })}>{l}</span>; })}
                        </div>
                    )}
                    {result.truncated && (
                        <p style={{ fontSize:12, color:'#e17055', fontWeight:600, margin:'6px 0' }}>{'⚠'} truncated — only the first chunks were processed.</p>
                    )}
                    <div style={{ display:'flex', gap:8, marginTop:10 }}>
                        <button onClick={function(){ jumpTo('visualize'); }} style={{
                            padding:'8px 16px', border:'none', borderRadius:6, cursor:'pointer',
                            fontWeight:700, color:'#fff', fontSize:12, fontFamily:'inherit', background:'#0984e3',
                        }}>Visualize</button>
                        <button onClick={function(){ jumpTo('ontology'); }} style={{
                            padding:'8px 16px', border:'none', borderRadius:6, cursor:'pointer',
                            fontWeight:700, color:'#fff', fontSize:12, fontFamily:'inherit', background:'#6c5ce7',
                        }}>Ontology</button>
                    </div>
                </div>
            )}

            <div style={{ marginTop:16 }}>
                <span style={{ fontSize:10, fontWeight:700, color:'#636e72', textTransform:'uppercase' }}>{'SOURCES · ' + (graphName || 'this graph') + ' (' + graphEngine + ')'}</span>
                {currentSources.length === 0 ? (
                    <p style={{ fontSize:12, color:'#b2bec3', margin:'6px 0 0' }}>{'No sources added to ' + (graphName || 'this graph') + ' on ' + graphEngine + ' yet.'}</p>
                ) : (
                    <div style={{ marginTop:6, display:'flex', flexDirection:'column', gap:4 }}>
                        {currentSources.map(function(s, i) {
                            return (
                                <div key={'src_' + i} style={{ fontSize:12, color:'#2d3436', background:'#f7f9fb', border:'1px solid #eef2f7', borderRadius:6, padding:'6px 10px', display:'flex', alignItems:'center', gap:6 }}>
                                    <span>{s.kind === 'file' ? '📄' : '✎'}</span>
                                    <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.label}</span>
                                    <span style={{ fontSize:11, color:'#636e72' }}>{'· '}{s.entities || 0} entities / {s.relations || 0} rels</span>
                                </div>
                            );
                        })}
                    </div>
                )}
            </div>
        </div>
    );
}

/* ═══════════════════ ListPanel ═════════════════════════════
   Renders the graphs returned by Connect as a selectable list.
   Selecting a graph sets it active and jumps to the Load action, so
   the next obvious step (pulling its data) is one click away. */
function ListPanel(props) {
    var graphs = props.graphs || [], activeGraph = props.activeGraph, onSelectGraph = props.onSelectGraph;
    var graphSizes = props.graphSizes || {};
    var onDeleteGraph = props.onDeleteGraph;
    var gwClient = props.gwClient;
    const [ddlOpen, setDdlOpen] = useState({});      // { [graph]: bool }
    const [ddlByGraph, setDdlByGraph] = useState({}); // { [graph]: string|null|'…loading' }
    function toggleDdl(name, e) {
        if (e) e.stopPropagation();
        setDdlOpen(function(prev){ var n = Object.assign({}, prev); n[name] = !prev[name]; return n; });
        if (gwClient && !Object.prototype.hasOwnProperty.call(ddlByGraph, name)) {
            setDdlByGraph(function(prev){ var n = Object.assign({}, prev); n[name] = '…loading'; return n; });
            gwClient.graphDdl(name)
                .then(function(r){ setDdlByGraph(function(prev){ var n = Object.assign({}, prev); n[name] = (r && r.statement) || null; return n; }); })
                .catch(function(){ setDdlByGraph(function(prev){ var n = Object.assign({}, prev); n[name] = null; return n; }); });
        }
    }
    return (
        <div style={{ width:420, maxWidth:'100%', textAlign:'left', background:'#fff', border:'1px solid #dfe6e9', borderRadius:10, padding:24, boxShadow:'0 2px 8px rgba(0,0,0,0.04)' }}>
            <h2 style={{ fontWeight:700, fontSize:18, margin:'0 0 4px', color:'#2d3436' }}>Graphs</h2>
            <p style={{ fontSize:12, color:'#b2bec3', margin:'0 0 16px' }}>{graphs.length} graph{graphs.length === 1 ? '' : 's'} available — select one to load.</p>
            {graphs.length === 0 ? (
                <p style={{ fontSize:13, color:'#636e72', margin:0 }}>No graphs found. Connect first.</p>
            ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:2, maxHeight:400, overflow:'auto' }}>
                    {graphs.map(function(name) {
                        var isActive = activeGraph === name;
                        var sz = graphSizes[name];
                        return (
                            <div key={name}>
                            <div onClick={function(){ onSelectGraph(name); }} style={{
                                padding:'9px 12px', borderRadius:6, cursor:'pointer', fontSize:13, userSelect:'none',
                                fontWeight: isActive ? 700 : 500, background: isActive ? '#eef2f7' : 'transparent',
                                color: isActive ? '#0984e3' : '#2d3436', borderLeft: isActive ? '4px solid #0984e3' : '4px solid transparent',
                                transition:'0.15s', display:'flex', alignItems:'baseline', gap:6,
                            }}>
                                <span>{name}</span>
                                {sz && <span style={{ fontSize:11, fontWeight:600, color:'#00b894' }}>{'—'} {(sz.nodes||0).toLocaleString()} nodes / {(sz.edges||0).toLocaleString()} edges</span>}
                                <span onClick={function(e){ toggleDdl(name, e); }} title="Show the creation SQL / recipe" style={{ flexShrink:0, marginLeft: sz ? 8 : 'auto', color:'#0984e3', cursor:'pointer', fontSize:11, fontWeight:700, padding:'0 4px', userSelect:'none' }}>{ddlOpen[name] ? '⌃ SQL' : '⌄ SQL'}</span>
                                {onDeleteGraph && <span onClick={function(e){ e.stopPropagation(); onDeleteGraph(name); }} title={'Delete graph ' + name} style={{ flexShrink:0, marginLeft: sz ? 0 : 'auto', color:'#d63031', cursor:'pointer', fontSize:12, padding:'0 4px', opacity:0.75 }}>{'🗑'}</span>}
                            </div>
                            {ddlOpen[name] && (
                                <pre style={{ margin:'2px 0 8px', padding:10, background:'#f8fafc', border:'1px solid #eef1f4', borderRadius:6, fontSize:11, whiteSpace:'pre-wrap', overflowX:'auto', color:'#2d3436' }}>
                                    {ddlByGraph[name] === '…loading' ? 'Loading…' : (ddlByGraph[name] || 'No recorded creation recipe.')}
                                </pre>
                            )}
                            </div>
                        );
                    })}
                </div>
            )}
        </div>
    );
}

/* ═══════════════════ BuildPanel ═══════════════════════════
   One "Build a graph" roof unifying Create (structured, from
   tables/files) and Extract (from documents). A Source radio swaps
   between the existing CreatePanel and ExtractPanel; a Mode radio
   picks Append vs Recreate. This panel adds NO build logic — it only
   selects which sub-panel shows and, for Documents, the buildMode it
   receives. Structured Append is Slice B, so Append is disabled when
   Source = Tables/files (CreatePanel already does CREATE OR REPLACE). */
function BuildPanel(props) {
    const [source, setSource] = useState('documents'); // 'documents' | 'tables'
    const [mode, setMode] = useState('append');        // 'append' | 'recreate'
    // Tables/files: structured append is Slice B — CreatePanel is always
    // CREATE OR REPLACE, so the effective mode there is 'recreate'.
    var effMode = source === 'tables' ? 'recreate' : mode;

    var wrap = { display:'flex', flexDirection:'column', flex:1, minHeight:0, width:'100%' };
    var bar = { display:'flex', flexWrap:'wrap', alignItems:'center', gap:18, padding:'12px 16px', borderBottom:'1px solid #eee', background:'#fafbfc' };
    var groupLbl = { fontSize:12, fontWeight:700, color:'#636e72', marginRight:8 };

    function radio(name, val, cur, set, text, disabled) {
        return (
            <label style={{ display:'inline-flex', alignItems:'center', gap:5, fontSize:13, cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.45 : 1 }}
                   title={disabled ? 'Structured append is coming in a later slice — use Recreate (CREATE OR REPLACE) for now.' : ''}>
                <input type="radio" name={name} checked={cur === val} disabled={!!disabled}
                       onChange={function(){ if (!disabled) set(val); }} />
                {text}
            </label>
        );
    }

    return (
        <div style={wrap}>
            <div style={bar}>
                <div style={{ display:'inline-flex', alignItems:'center' }}>
                    <span style={groupLbl}>Source</span>
                    {radio('build-source', 'tables', source, setSource, 'Tables / files', false)}
                    {radio('build-source', 'documents', source, setSource, 'Documents (extract)', false)}
                </div>
                <div style={{ display:'inline-flex', alignItems:'center' }}>
                    <span style={groupLbl}>Mode</span>
                    {radio('build-mode', 'append', effMode, setMode, 'Append', source === 'tables')}
                    {radio('build-mode', 'recreate', effMode, setMode, 'Recreate', false)}
                </div>
            </div>
            {source === 'documents'
                ? <ExtractPanel {...props.extractProps} buildMode={effMode} />
                : <CreatePanel {...props.createProps} />}
        </div>
    );
}

/* ═══════════════════ StoragePanel ════════════════════════════════════════
   Storage viewer: inspects the underlying storage backing the active graph —
   Kinetica extract tables (columns + up to 25 sample rows, via
   gwClient.storage) or the engine's own graph-store note (FalkorDB — see
   base.py's ABC default) — plus a DuckDB source preview (gwClient.sourcePreview)
   of HYDRATE_SOURCE. DuckDB is stateless: a query layer over files, nothing
   persistent, so that second box previews the source Parquet file itself, not
   a persisted table. Both fetches auto-run on mount and whenever the active
   graph / client change. ═══ */
function StorageTable(props) {
    var name = props.name, columns = props.columns || [], rows = props.rows || [];
    return (
        <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:13, fontWeight:700, color:'#2d3436', marginBottom:6, fontFamily:'monospace' }}>{name}</div>
            <div style={{ overflow:'auto', maxHeight:280, border:'1px solid #dfe6e9', borderRadius:6 }}>
                <table style={{ borderCollapse:'collapse', fontSize:12, width:'100%' }}>
                    <thead>
                        <tr>
                            {columns.map(function(c, i) {
                                return (
                                    <th key={i} style={{ textAlign:'left', padding:'6px 10px', background:'#f8f9fa', borderBottom:'1px solid #dfe6e9', position:'sticky', top:0, color:'#636e72', fontWeight:600, whiteSpace:'nowrap' }}>{c}</th>
                                );
                            })}
                        </tr>
                    </thead>
                    <tbody>
                        {rows.map(function(r, ri) {
                            return (
                                <tr key={ri}>
                                    {r.map(function(v, ci) {
                                        return (
                                            <td key={ci} style={{ padding:'5px 10px', borderBottom:'1px solid #f1f2f6', color:'#2d3436', whiteSpace:'nowrap' }}>
                                                {v === null || v === undefined ? <span style={{ color:'#b2bec3' }}>{'null'}</span> : String(v)}
                                            </td>
                                        );
                                    })}
                                </tr>
                            );
                        })}
                    </tbody>
                </table>
            </div>
            <div style={{ fontSize:11, color:'#b2bec3', marginTop:4 }}>{rows.length} row{rows.length === 1 ? '' : 's'} shown (max 25)</div>
        </div>
    );
}

function StoragePanel(props) {
    var gwClient = props.gwClient, activeGraph = props.activeGraph;
    const [storageData, setStorageData] = useState(null);
    const [storageBusy, setStorageBusy] = useState(false);
    const [storageError, setStorageError] = useState(null);
    const [sourceData, setSourceData] = useState(null);
    const [sourceBusy, setSourceBusy] = useState(false);
    const [sourceError, setSourceError] = useState(null);
    // Extracted graphs store attrs ON the nodes (no external Parquet) -- the
    // /documents ledger tells us which; if present, preview the provenance
    // ledger instead of the unrelated banking vertexes.parquet.
    const [storageDocs, setStorageDocs] = useState([]);
    useEffect(function() {
        if (!gwClient || !activeGraph) { setStorageDocs([]); return; }
        gwClient.documents(activeGraph).then(function(r){ setStorageDocs((r && r.documents) || []); }).catch(function(){ setStorageDocs([]); });
    }, [gwClient, activeGraph]);
    var isExtracted = storageDocs.length > 0;

    useEffect(function() {
        if (!gwClient || !activeGraph) { setStorageData(null); return; }
        var cancelled = false;
        (async function() {
            setStorageBusy(true); setStorageError(null);
            try {
                var r = await gwClient.storage(activeGraph);
                if (!cancelled) setStorageData(r);
            } catch (err) {
                if (!cancelled) { setStorageError((err && err.message) || String(err)); setStorageData(null); }
            } finally {
                if (!cancelled) setStorageBusy(false);
            }
        })();
        return function(){ cancelled = true; };
    }, [gwClient, activeGraph]);

    useEffect(function() {
        if (!gwClient) { setSourceData(null); return; }
        var cancelled = false;
        (async function() {
            setSourceBusy(true); setSourceError(null);
            try {
                var r = await gwClient.sourcePreview(HYDRATE_SOURCE);
                if (!cancelled) setSourceData(r);
            } catch (err) {
                if (!cancelled) { setSourceError((err && err.message) || String(err)); setSourceData(null); }
            } finally {
                if (!cancelled) setSourceBusy(false);
            }
        })();
        return function(){ cancelled = true; };
    }, [gwClient]);

    return (
        <div style={{ width:'100%', maxWidth:900, textAlign:'left', display:'flex', flexDirection:'column', gap:20, margin:'0 auto', overflow:'auto', padding:'0 4px' }}>
            <div style={{ background:'#fff', border:'1px solid #dfe6e9', borderRadius:10, padding:24, boxShadow:'0 2px 8px rgba(0,0,0,0.04)' }}>
                <h2 style={{ fontWeight:700, fontSize:18, margin:'0 0 4px', color:'#2d3436' }}>Storage</h2>
                <p style={{ fontSize:12, color:'#b2bec3', margin:'0 0 16px' }}>
                    Inspect the underlying storage backing <strong>{activeGraph}</strong>.
                </p>
                {storageBusy && <p style={{ fontSize:13, color:'#636e72' }}>{'Loading storage…'}</p>}
                {storageError && <p style={{ fontSize:13, color:'#d63031' }}>{storageError}</p>}
                {!storageBusy && !storageError && storageData && (
                    storageData.tables && storageData.tables.length > 0 ? (
                        storageData.tables.map(function(t) {
                            return <StorageTable key={t.name} name={t.name} columns={t.columns} rows={t.rows} />;
                        })
                    ) : (
                        <p style={{ fontSize:13, color:'#636e72', margin:0 }}>{storageData.note || 'No backing tables to show.'}</p>
                    )
                )}
            </div>
            {isExtracted ? (
                <div style={{ background:'#fff', border:'1px solid #dfe6e9', borderRadius:10, padding:24, boxShadow:'0 2px 8px rgba(0,0,0,0.04)' }}>
                    <h2 style={{ fontWeight:700, fontSize:18, margin:'0 0 4px', color:'#2d3436' }}>Provenance — documents</h2>
                    <p style={{ fontSize:12, color:'#b2bec3', margin:'0 0 16px' }}>
                        Built from {storageDocs.length} document{storageDocs.length === 1 ? '' : 's'} via Extract — attributes live on the graph nodes (no external Parquet source).
                    </p>
                    {storageDocs.map(function(d, i){
                        return <div key={i} style={{ fontSize:13, color:'#2d3436', padding:'6px 0', borderBottom:'1px solid #f1f2f6' }}>
                            {(d.source_type === 'file' ? '📄 ' : '✎ ') + d.doc_uri}
                            <span style={{ fontSize:11, color:'#b2bec3', marginLeft:8 }}>· {d.status} · ingested {String(d.last_ingested_ts || '').slice(0,19).replace('T',' ')}</span>
                        </div>;
                    })}
                </div>
            ) : (
                <div style={{ background:'#fff', border:'1px solid #dfe6e9', borderRadius:10, padding:24, boxShadow:'0 2px 8px rgba(0,0,0,0.04)' }}>
                    <h2 style={{ fontWeight:700, fontSize:18, margin:'0 0 4px', color:'#2d3436' }}>DuckDB source preview</h2>
                    <p style={{ fontSize:12, color:'#b2bec3', margin:'0 0 16px' }}>
                        DuckDB is stateless — a query layer over files, not a persisted store — so this
                        previews the source file (<code>{HYDRATE_SOURCE}</code>) itself, not a table.
                    </p>
                    {sourceBusy && <p style={{ fontSize:13, color:'#636e72' }}>{'Loading source preview…'}</p>}
                    {sourceError && <p style={{ fontSize:13, color:'#d63031' }}>{sourceError}</p>}
                    {!sourceBusy && !sourceError && sourceData && (
                        <StorageTable name={HYDRATE_SOURCE} columns={sourceData.columns} rows={sourceData.rows} />
                    )}
                </div>
            )}
        </div>
    );
}

/* ═══════════════════ InteractAskPanel (Interact① — NL → Cypher → English) ═══
   Full round-trip: an English question goes to the gateway's /ask endpoint,
   which runs an LLM-driven NL→Cypher translation, executes the Cypher against
   the active graph, and synthesizes an English answer from the results —
   all in one call (gwClient.ask). Renders, in order: the English answer, the
   generated Cypher (with a "Run in Query" handoff into a Query tab), a
   compact results table (via tableFromGateway, matching the Query panel's
   own "View Results" shape), and — if the response carries a `graph` payload
   — a force-graph visualization colored with the SAME PALETTE-cycled
   label→color assignment QueryPanel's own visualization uses (see
   QueryPanel's `labelColorMap`/`getNodeColor`/`getEdgeColor` around line
   2746), so a node/edge label is always the same color everywhere in the
   app. ═══ */
function InteractAskPanel(props) {
    var gwClient = props.gwClient, activeGraph = props.activeGraph, labelData = props.labelData;
    var onRunInQuery = props.onRunInQuery;
    var askHistory = props.askHistory || []; var setAskHistory = props.setAskHistory;
    var graphEngine = props.graphEngine;
    const [question, setQuestion] = useState('');
    const [busy, setBusy] = useState(false);
    const [error, setError] = useState(null);
    const [answerData, setAnswerData] = useState(null); // {question, cypher, columns, rows, graph, answer}
    var graphContainerRef = useRef(null);
    var graphRef = useRef(null);

    var handleAsk = async function() {
        if (!gwClient || !activeGraph || !question.trim() || busy) return;
        setBusy(true); setError(null);
        try {
            var r = await gwClient.ask(activeGraph, question.trim());
            setAnswerData(r);
            if (setAskHistory) {
                setAskHistory(function(prev){
                    var next = prev.concat([{
                        graph: activeGraph, question: question.trim(), cypher: r.cypher, answer: r.answer,
                        engine: graphEngine,
                        rowCount: (r.rows||[]).length, ts: new Date().toISOString(),
                    }]);
                    return next.slice(-50);
                });
            }
        } catch (err) {
            setError((err && err.message) || String(err));
            setAnswerData(null);
        } finally {
            setBusy(false);
        }
    };

    // ─── Same label→color assignment as QueryPanel's own visualization:
    // PALETTE-cycled, indexed by each label combo's rank in the schema's
    // node_labels/edge_labels (sorted by count desc). ───
    var labelColorMap = useMemo(function() {
        var map = {};
        if (labelData) {
            var nl = [].concat(labelData.node_labels || []).sort(function(a, b) { return b.count - a.count; });
            nl.forEach(function(item, idx) {
                var comboKey = (item.labels || []).slice().sort().join('|');
                map['n:' + comboKey] = PALETTE[idx % PALETTE.length].solid;
            });
            var el = [].concat(labelData.edge_labels || []).sort(function(a, b) { return b.count - a.count; });
            el.forEach(function(item, idx) {
                var comboKey = (item.labels || []).slice().sort().join('|');
                map['e:' + comboKey] = PALETTE[idx % PALETTE.length].solid;
            });
        }
        return map;
    }, [labelData]);
    var getNodeColor = function(rawLabel) {
        if (!rawLabel) return '#b2bec3';
        var labels = typeof rawLabel === 'string' && rawLabel.charAt(0) === '[' ? (function(){ try { return JSON.parse(rawLabel); } catch(e) { return [rawLabel]; } })() : [rawLabel];
        return labelColorMap['n:' + labels.slice().sort().join('|')] || '#b2bec3';
    };
    var getEdgeColor = function(rawLabel) {
        if (!rawLabel) return '#636e72';
        var labels = typeof rawLabel === 'string' && rawLabel.charAt(0) === '[' ? (function(){ try { return JSON.parse(rawLabel); } catch(e) { return [rawLabel]; } })() : [rawLabel];
        return labelColorMap['e:' + labels.slice().sort().join('|')] || '#636e72';
    };

    var tableData = useMemo(function() {
        if (!answerData || !answerData.columns) return { headers: [], rows: [] };
        return window.xgraphGateway.tableFromGateway(answerData);
    }, [answerData]);

    var resultGraph = (answerData && answerData.graph) ? answerData.graph : null;
    var hasResultGraph = !!(resultGraph && resultGraph.nodes && resultGraph.nodes.length > 0);
    var graphData = useMemo(function() {
        if (!hasResultGraph) return { nodes: [], links: [], maxDegree: 1 };
        var nodeMap = {}, linkMap = {};
        (resultGraph.nodes || []).forEach(function(n) {
            nodeMap[n.id] = { id: n.id, label: n.label || '', color: getNodeColor(n.label), degree: 0 };
        });
        (resultGraph.edges || []).forEach(function(e, idx) {
            if (!nodeMap[e.source] || !nodeMap[e.target]) return; // dangling endpoint — skip
            var linkKey = e.id != null ? String(e.id) : (e.source + '→' + e.target + '|' + e.type + '|' + idx);
            if (!linkMap[linkKey]) {
                linkMap[linkKey] = { source: e.source, target: e.target, edgeLabel: e.type, color: getEdgeColor(e.type) };
                nodeMap[e.source].degree++; nodeMap[e.target].degree++;
            }
        });
        var nodes = Object.values(nodeMap), links = Object.values(linkMap), maxDegree = 1;
        nodes.forEach(function(n) { if (n.degree > maxDegree) maxDegree = n.degree; });
        return { nodes: nodes, links: links, maxDegree: maxDegree };
    }, [resultGraph, labelColorMap]);

    // ─── Force-graph lifecycle (mirrors QueryPanel's own graph-tab effect,
    // trimmed down for a read-only, always-visible viz). ───
    useEffect(function() {
        if (!graphContainerRef.current || graphData.nodes.length === 0) return;
        if (graphRef.current) { graphRef.current._destructor && graphRef.current._destructor(); graphRef.current = null; }
        graphContainerRef.current.innerHTML = '';
        var width = graphContainerRef.current.clientWidth || 600;
        var height = graphContainerRef.current.clientHeight || 360;
        var maxDeg = graphData.maxDegree || 1;
        var nodeRadius = function(d) { return 4 + Math.sqrt((d.degree || 0) / maxDeg) * 14; };
        var graph = new ForceGraph(graphContainerRef.current)
            .width(width).height(height)
            .backgroundColor('#0a0a1a')
            .graphData(graphData)
            .nodeId('id')
            .nodeVal(function(n) { return n.degree || 1; })
            .nodeCanvasObjectMode(function() { return 'replace'; })
            .nodeCanvasObject(function(node, ctx, globalScale) {
                var r = nodeRadius(node);
                ctx.beginPath(); ctx.arc(node.x, node.y, r, 0, 2 * Math.PI, false);
                ctx.fillStyle = node.color || '#b2bec3'; ctx.globalAlpha = 0.85; ctx.fill(); ctx.globalAlpha = 1.0;
                if (globalScale > 0.4) {
                    var fontSize = Math.max(r * 0.5, 3);
                    ctx.font = 'bold ' + fontSize + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#fff';
                    var text = node.label || ''; if (text.length > 16) text = text.substring(0, 14) + '…';
                    ctx.fillText(text, node.x, node.y);
                }
            })
            .nodeLabel(function(n) { return n.id + (n.label ? ' [' + n.label + ']' : ''); })
            .linkSource('source').linkTarget('target')
            .linkColor(function(l) { return l.color || 'rgba(255,255,255,0.2)'; })
            .linkWidth(1.5)
            .linkLabel(function(l) { return l.edgeLabel || ''; })
            .linkDirectionalArrowLength(6).linkDirectionalArrowRelPos(1)
            .d3Force('charge', d3.forceManyBody().strength(-200))
            .d3Force('link', d3.forceLink().id(function(n) { return n.id; }).distance(80));
        graphRef.current = graph;
        return function() { if (graphRef.current) { graphRef.current._destructor && graphRef.current._destructor(); graphRef.current = null; } };
    }, [graphData]);

    if (!activeGraph) {
        return (
            <div style={{ textAlign:'center', color:'#636e72' }}>
                <h2 style={{ fontWeight:700, fontSize:20, margin:'0 0 8px' }}>Ask — plain English to Cypher</h2>
                <p style={{ fontSize:14, color:'#b2bec3' }}>Select a graph first.</p>
            </div>
        );
    }

    var handleRunInQuery = function() {
        if (answerData && answerData.cypher && onRunInQuery) onRunInQuery(answerData.cypher);
    };

    // Prior Q&As for the CURRENT (activeGraph, graphEngine) only — the same
    // graph name can exist on a different engine with entirely different
    // content, so filter by both, not just graph. Newest-first. Legacy
    // entries saved before engine was recorded (no h.engine) still match via
    // the `|| !h.engine` tolerance.
    var convo = askHistory.filter(function(h){
        return h.graph === activeGraph && (h.engine === graphEngine || !h.engine);
    }).slice().reverse();

    return (
        <div style={{ width:'100%', maxWidth:900, display:'flex', flexDirection:'column', gap:14, textAlign:'left' }}>
            <h2 style={{ fontWeight:700, fontSize:18, margin:0, color:'#2d3436' }}>Ask — plain English to Cypher</h2>
            <div style={{ display:'flex', gap:8, alignItems:'flex-start' }}>
                <textarea value={question} onChange={function(e){ setQuestion(e.target.value); }} rows={2}
                    placeholder={"Ask a question about " + activeGraph + "…"}
                    onKeyDown={function(e){ if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); handleAsk(); } }}
                    style={{ flex:1, fontFamily:'inherit', fontSize:13, padding:8, border:'1px solid #dfe6e9', borderRadius:6, resize:'vertical' }} />
                <button onClick={handleAsk} disabled={busy || !question.trim()} style={{
                    padding:'8px 18px', border:'none', borderRadius:6, cursor: (busy || !question.trim()) ? 'not-allowed' : 'pointer',
                    fontWeight:700, color:'#fff', background: (busy || !question.trim()) ? '#74b9ff' : 'linear-gradient(135deg,#0984e3,#0872c4)',
                }}>{busy ? 'Thinking…' : 'Ask'}</button>
            </div>
            {error && <div style={{ color:'#d63031', fontSize:12 }}>{error}</div>}
            {busy && <div style={{ fontSize:12, color:'#636e72' }}>Thinking… the LLM round-trip can take up to a minute.</div>}
            {answerData && (
                <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                    <div style={{ background:'#eef7ff', border:'1px solid #cbe4fb', borderRadius:8, padding:12 }}>
                        <div style={{ fontSize:11, fontWeight:700, color:'#0984e3', textTransform:'uppercase', marginBottom:4 }}>Answer</div>
                        <div style={{ fontSize:14, color:'#2d3436', whiteSpace:'pre-wrap' }}>{answerData.answer}</div>
                    </div>
                    <div>
                        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
                            <div style={{ fontSize:11, fontWeight:700, color:'#636e72', textTransform:'uppercase' }}>Generated Cypher</div>
                            <button onClick={handleRunInQuery} disabled={!answerData.cypher} style={{
                                padding:'3px 10px', border:'none', borderRadius:4, cursor: answerData.cypher ? 'pointer' : 'not-allowed',
                                fontWeight:700, fontSize:11, color:'#fff', background: answerData.cypher ? '#00b894' : '#b2bec3',
                            }}>Run in Query</button>
                        </div>
                        <pre style={{ margin:0, fontFamily:'monospace', fontSize:12, background:'#2d3436', color:'#dfe6e9', padding:10, borderRadius:6, overflow:'auto', maxHeight:200 }}>{answerData.cypher}</pre>
                    </div>
                    {!!(tableData.headers && tableData.headers.length) && (
                        <div>
                            <div style={{ fontSize:11, fontWeight:700, color:'#636e72', textTransform:'uppercase', marginBottom:4 }}>Results ({tableData.rows.length})</div>
                            <div style={{ overflow:'auto', maxHeight:240, border:'1px solid #eee', borderRadius:6 }}>
                                <table style={{ borderCollapse:'collapse', width:'100%', fontSize:12 }}>
                                    <thead>
                                        <tr>{tableData.headers.map(function(c) { return <th key={c} style={{ textAlign:'left', padding:'4px 8px', background:'#fafbfc', borderBottom:'1px solid #eee', position:'sticky', top:0 }}>{c}</th>; })}</tr>
                                    </thead>
                                    <tbody>
                                        {tableData.rows.slice(0, 200).map(function(row, ridx) {
                                            return <tr key={ridx}>{tableData.headers.map(function(c) { return <td key={c} style={{ padding:'4px 8px', borderBottom:'1px solid #f4f4f4' }}>{String(row[c])}</td>; })}</tr>;
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                    {hasResultGraph && (
                        <div>
                            <div style={{ fontSize:11, fontWeight:700, color:'#636e72', textTransform:'uppercase', marginBottom:4 }}>Visualization ({graphData.nodes.length} nodes)</div>
                            <div ref={graphContainerRef} style={{ width:'100%', height:360, borderRadius:8, overflow:'hidden' }} />
                        </div>
                    )}
                </div>
            )}
            {!!convo.length && (
                <div>
                    <div style={{ fontSize:11, fontWeight:700, color:'#636e72', textTransform:'uppercase', marginBottom:6 }}>{'Conversation · ' + activeGraph}</div>
                    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                        {convo.map(function(h, idx) {
                            return (
                                <div key={idx} style={{ background:'#fafbfc', border:'1px solid #eee', borderRadius:8, padding:10 }}>
                                    <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8 }}>
                                        <div style={{ fontSize:13, fontWeight:700, color:'#2d3436' }}>{h.question}</div>
                                        <button onClick={function(){ setQuestion(h.question); }} style={{
                                            flex:'0 0 auto', padding:'2px 8px', border:'1px solid #dfe6e9', borderRadius:4, cursor:'pointer',
                                            fontSize:11, fontWeight:700, color:'#0984e3', background:'#fff',
                                        }}>Ask again</button>
                                    </div>
                                    <div style={{ fontSize:12, color:'#636e72', whiteSpace:'pre-wrap', marginTop:4 }}>{h.answer}</div>
                                    <pre style={{ margin:'6px 0 0', fontFamily:'monospace', fontSize:11, background:'#2d3436', color:'#dfe6e9', padding:8, borderRadius:6, overflow:'auto', maxHeight:80 }}>{h.cypher}</pre>
                                </div>
                            );
                        })}
                    </div>
                </div>
            )}
        </div>
    );
}

/* ═══════════════════ InteractExplainPanel (Interact② — results → English) ═══
   Explains the ACTIVE query tab's last result via the gateway's /synthesize
   endpoint. Reads `sql`/`result` for the active tab straight from App state
   (queryTabSql[activeQueryTab] / queryTabResult[activeQueryTab] — the latter
   populated by QueryPanel's onResultChange prop right after each run). ═══ */
function InteractExplainPanel(props) {
    var gwClient = props.gwClient, activeGraph = props.activeGraph;
    var sql = props.sql || '', result = props.result || null;
    const [focusText, setFocusText] = useState('');
    const [busy, setBusy] = useState(false);
    const [error, setError] = useState(null);
    const [resp, setResp] = useState(null); // {answer, join_sql, columns, rows, hydrated}
    const [queryText, setQueryText] = useState(sql);
    useEffect(function(){ setQueryText(props.sql || ''); }, [props.sql]);

    var handleExplain = async function() {
        if (!gwClient || busy) return;
        var cypher = (queryText || '').trim();
        setBusy(true); setError(null);
        try {
            var cols = result && result.columns, rws = result && result.rows;
            // No active-query result, or the user edited/pasted a different query → run it to get rows.
            if (!rws || cypher !== (sql || '').trim()) {
                if (!cypher) throw new Error('Enter or paste a query to explain.');
                var qr = await gwClient.runQuery(activeGraph, cypher);
                cols = qr.columns; rws = qr.rows;
            }
            var r = await gwClient.explain(focusText.trim() || 'Explain these results', cols, rws, cypher, HYDRATE_SOURCE, activeGraph);
            setResp(r);
        } catch (err) {
            setError((err && err.message) || String(err));
            setResp(null);
        } finally {
            setBusy(false);
        }
    };

    // Post-join results table (only meaningful when resp.hydrated) — same
    // {headers, rows} shape InteractAskPanel builds from a gateway {columns,
    // rows} response, via the same shared helper.
    var joinTableData = useMemo(function() {
        if (!resp || !resp.hydrated || !resp.columns) return { headers: [], rows: [] };
        return window.xgraphGateway.tableFromGateway(resp);
    }, [resp]);

    if (!activeGraph) {
        return (
            <div style={{ textAlign:'center', color:'#636e72' }}>
                <h2 style={{ fontWeight:700, fontSize:20, margin:'0 0 8px' }}>Explain — results in plain English</h2>
                <p style={{ fontSize:14, color:'#b2bec3' }}>Select a graph first.</p>
            </div>
        );
    }

    return (
        <div style={{ width:'100%', maxWidth:800, display:'flex', flexDirection:'column', gap:14, textAlign:'left' }}>
            <h2 style={{ fontWeight:700, fontSize:18, margin:0, color:'#2d3436' }}>Explain — results in plain English</h2>
            <div>
                <div style={{ fontSize:11, fontWeight:700, color:'#636e72', textTransform:'uppercase', marginBottom:4 }}>Active query <span style={{ fontWeight:400, textTransform:'none', color:'#b2bec3' }}>— editable; paste one if there's no active query</span></div>
                <textarea value={queryText} onChange={function(e){ setQueryText(e.target.value); }} spellCheck="false"
                    onKeyDown={function(e){ if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); handleExplain(); } }}
                    placeholder="Paste or type a query to explain…"
                    style={{ width:'100%', boxSizing:'border-box', margin:0, fontFamily:'monospace', fontSize:12, background:'#2d3436', color:'#dfe6e9', padding:10, borderRadius:6, border:'none', minHeight:72, resize:'vertical' }} />
            </div>
            <React.Fragment>
                    {result && result.rows
                        ? <div style={{ fontSize:12, color:'#636e72' }}>{result.rows.length} row{result.rows.length === 1 ? '' : 's'} from the active query{(queryText || '').trim() !== (sql || '').trim() ? ' — edited, will re-run.' : ' available to explain.'}</div>
                        : <div style={{ fontSize:12, color:'#636e72' }}>No active query result — the query above will be run, then explained.</div>}
                    <div style={{ display:'flex', gap:8 }}>
                        <input type="text" value={focusText} onChange={function(e){ setFocusText(e.target.value); }}
                            placeholder="What to focus on (optional)…"
                            onKeyDown={function(e){ if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); handleExplain(); } }}
                            style={{ flex:1, fontSize:13, padding:8, border:'1px solid #dfe6e9', borderRadius:6 }} />
                        <button onClick={handleExplain} disabled={busy} style={{
                            padding:'8px 18px', border:'none', borderRadius:6, cursor: busy ? 'not-allowed' : 'pointer',
                            fontWeight:700, color:'#fff', background: busy ? '#74b9ff' : 'linear-gradient(135deg,#0984e3,#0872c4)',
                        }}>{busy ? 'Thinking…' : 'Explain in plain English'}</button>
                    </div>
                    {error && <div style={{ color:'#d63031', fontSize:12 }}>{error}</div>}
                    {busy && <div style={{ fontSize:12, color:'#636e72' }}>Thinking… this can take up to a minute.</div>}
                    {resp && resp.hydrated && (
                        <div>
                            <div style={{ fontSize:11, fontWeight:700, color:'#636e72', textTransform:'uppercase', marginBottom:4 }}>Post-join SQL</div>
                            <pre style={{ margin:0, fontFamily:'monospace', fontSize:12, background:'#2d3436', color:'#dfe6e9', padding:10, borderRadius:6, overflow:'auto', maxHeight:200 }}>{resp.join_sql}</pre>
                        </div>
                    )}
                    {resp && resp.hydrated && !!(joinTableData.headers && joinTableData.headers.length) && (
                        <div>
                            <div style={{ fontSize:11, fontWeight:700, color:'#636e72', textTransform:'uppercase', marginBottom:4 }}>Results ({joinTableData.rows.length})</div>
                            <div style={{ overflow:'auto', maxHeight:240, border:'1px solid #eee', borderRadius:6 }}>
                                <table style={{ borderCollapse:'collapse', width:'100%', fontSize:12 }}>
                                    <thead>
                                        <tr>{joinTableData.headers.map(function(c) { return <th key={c} style={{ textAlign:'left', padding:'4px 8px', background:'#fafbfc', borderBottom:'1px solid #eee', position:'sticky', top:0 }}>{c}</th>; })}</tr>
                                    </thead>
                                    <tbody>
                                        {joinTableData.rows.slice(0, 200).map(function(row, ridx) {
                                            return <tr key={ridx}>{joinTableData.headers.map(function(c) { return <td key={c} style={{ padding:'4px 8px', borderBottom:'1px solid #f4f4f4' }}>{String(row[c])}</td>; })}</tr>;
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                    {resp && (
                        <div style={{ background:'#eef7ff', border:'1px solid #cbe4fb', borderRadius:8, padding:12 }}>
                            <div style={{ fontSize:11, fontWeight:700, color:'#0984e3', textTransform:'uppercase', marginBottom:4 }}>Answer</div>
                            <div style={{ fontSize:14, color:'#2d3436', whiteSpace:'pre-wrap' }}>{resp.answer}</div>
                        </div>
                    )}
                </React.Fragment>
        </div>
    );
}

function App() {
    const [graphs, setGraphs]             = useState([]);
    // Top-level action-bar router (replaces the old Sidebar + SplitPane shell).
    // `activeAction` selects which panel the content region below the
    // ActionBar renders. Interact/Query/Visualize/Ontology are reachable as
    // soon as a graph is selected (activeGraph) — there is no separate Load
    // gate; entity loading now happens inside the Visualize action itself.
    const [activeAction, setActiveAction] = useState('setup');
    // Sidebar collapse — when true, the left rail shrinks to a 28-px strip
    // with just a `›` expand button so the workspace claims the full width.
    const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
    // Per-graph size map: { name: { nodes, edges } } built from /show/graph's
    // aligned num_nodes/num_edges arrays. Used by the sidebar to show a small
    // edge-count badge on each row and to enable size-based sorting.
    const [graphSizes, setGraphSizes]     = useState({});
    var buildGraphSizes = function(outer) {
        var out = {};
        var names = (outer && outer.graph_names) || [];
        var nn = (outer && outer.num_nodes) || [];
        var ne = (outer && outer.num_edges) || [];
        for (var i = 0; i < names.length; i++) out[names[i]] = { nodes: nn[i] || 0, edges: ne[i] || 0 };
        return out;
    };
    const [tables, setTables]             = useState([]); // [{name, type_id, ...}] from /show/table
    const [listMode, setListMode]         = useState('graphs'); // 'graphs' | 'tables'
    // Graph grammar: which identifier combinations are valid for each component.
    // Shape per component: { configurations: [{label, required:[ids]}], optional:[ids] }.
    // A configuration selects the MUTUALLY-EXCLUSIVE required slots; `optional` is the
    // set of add-on identifiers that can be filled in alongside ANY configuration of
    // that component (e.g., EDGE_LABEL / EDGE_WEIGHT / EDGE_PARTITION can be attached
    // to any EDGES configuration). The live /show/graph/grammar endpoint overrides
    // this when available; otherwise this fallback covers the common cases.
    const DEFAULT_GRAMMAR = {
        NODES: {
            configurations: [
                { label: 'NODE_NAME (string)',   required: ['NODE_NAME'] },
                { label: 'NODE_ID (int)',        required: ['NODE_ID'] },
                { label: 'NODE_WKTPOINT (WKT)',  required: ['NODE_WKTPOINT'] },
            ],
            optional: ['NODE_LABEL'],
        },
        EDGES: {
            configurations: [
                { label: 'NODE1 + NODE2 (string)', required: ['EDGE_NODE1_NAME','EDGE_NODE2_NAME'] },
                { label: 'NODE1 + NODE2 (int)',    required: ['EDGE_NODE1_ID','EDGE_NODE2_ID'] },
                { label: 'NODE1 + NODE2 (WKT)',    required: ['EDGE_NODE1_WKTPOINT','EDGE_NODE2_WKTPOINT'] },
                { label: 'EDGE_WKTLINE (single linestring)', required: ['EDGE_WKTLINE'] },
            ],
            optional: ['EDGE_ID','EDGE_LABEL','EDGE_WEIGHT','EDGE_PARTITION','EDGE_NODE1_LABEL','EDGE_NODE2_LABEL'],
        },
        WEIGHTS: {
            configurations: [
                { label: 'WEIGHTS_EDGE_ID + WEIGHTS_VALUESPECIFIED', required: ['WEIGHTS_EDGE_ID','WEIGHTS_VALUESPECIFIED'] },
                { label: 'NODE1 + NODE2 (string) + WEIGHTS_VALUESPECIFIED', required: ['WEIGHTS_EDGE_NODE1_NAME','WEIGHTS_EDGE_NODE2_NAME','WEIGHTS_VALUESPECIFIED'] },
                { label: 'NODE1 + NODE2 (int) + WEIGHTS_VALUESPECIFIED',    required: ['WEIGHTS_EDGE_NODE1_ID','WEIGHTS_EDGE_NODE2_ID','WEIGHTS_VALUESPECIFIED'] },
                { label: 'WEIGHTS_VALUESPECIFIED (positional, by edge order)', required: ['WEIGHTS_VALUESPECIFIED'] },
            ],
            optional: [],
        },
        RESTRICTIONS: {
            configurations: [
                { label: 'RESTRICTIONS_EDGE_ID + RESTRICTIONS_VALUE', required: ['RESTRICTIONS_EDGE_ID','RESTRICTIONS_VALUE'] },
                { label: 'RESTRICTIONS_NODE_ID + RESTRICTIONS_VALUE', required: ['RESTRICTIONS_NODE_ID','RESTRICTIONS_VALUE'] },
                { label: 'RESTRICTIONS_NODE_NAME + RESTRICTIONS_VALUE', required: ['RESTRICTIONS_NODE_NAME','RESTRICTIONS_VALUE'] },
                { label: 'RESTRICTIONS_VALUECOMPARED + RESTRICTIONS_ONCOMPARED', required: ['RESTRICTIONS_VALUECOMPARED','RESTRICTIONS_ONCOMPARED'] },
            ],
            optional: [],
        },
    };
    // DuckDB/FalkorDB grammar: id + optional label only (no Kinetica WKT/weights
    // configs). The builder's rows use these ids; the host (handleBuildFromModel)
    // maps NODE / EDGE_NODE1 / EDGE_NODE2 onto the /create spec.
    const DUCKDB_GRAMMAR = {
        NODES: { configurations: [{ label: 'Node id', required: ['NODE'] }], optional: ['NODE_LABEL'] },
        EDGES: { configurations: [{ label: 'Edge source + target', required: ['EDGE_NODE1','EDGE_NODE2'] }], optional: ['EDGE_LABEL'] },
        WEIGHTS: { configurations: [], optional: [] },
        RESTRICTIONS: { configurations: [], optional: [] },
    };
    const [graphGrammar, setGraphGrammar] = useState(DEFAULT_GRAMMAR);
    // Full per-endpoint grammar from /show/graph/grammar. Shape:
    //   { create:{components,filterparams,options}, solve:{...}, match:{...}, query:{...} }
    // Populated on Connect; consumed by SolvePanel/MatchPanel (to come). The
    // Create Helper still uses the legacy `graphGrammar` view above.
    const [endpointGrammar, setEndpointGrammar] = useState({});
    // Lazy column cache for the Create Helper: { 'schema.table': ['col1','col2',...] }.
    // Empty array entries denote either a fetch in-flight or "fetched, no columns".
    // We populate on demand when the user types a known table name followed by a dot.
    const [tableColumnsCache, setTableColumnsCache] = useState({});
    function fetchTableColumns(tableName) {
        if (!tableName || !credentials || !credentials.url) return;
        if (Object.prototype.hasOwnProperty.call(tableColumnsCache, tableName)) return; // already fetched or in-flight
        // Mark in-flight immediately to prevent duplicate fetches on rapid typing.
        setTableColumnsCache(function(prev) { var n = Object.assign({}, prev); n[tableName] = []; return n; });
        var hdrs = { 'Content-Type': 'application/json' };
        if (credentials.user || credentials.pass) hdrs['Authorization'] = 'Basic ' + btoa(credentials.user + ':' + credentials.pass);
        fetch(credentials.url + '/get/records', { method:'POST', headers: hdrs, body: JSON.stringify({ table_name: tableName, offset: 0, limit: 1, encoding: 'json', options: {} }) })
            .then(function(res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
            .then(function(data) {

                var ch = text[i];
                if (ch === '(') depth++;

                var bboxOuter = safeParse(bboxJson.data_str) || bboxJson;
                var bboxJer = safeParse(bboxOuter.json_encoded_response) || {};
                if (bboxJer.column_1 && bboxJer.column_1[0] != null) {
                    var bPad = 0.5;
                    wmsBbox = (bboxJer.column_1[0] - bPad) + ',' + (bboxJer.column_2[0] - bPad) + ',' + (bboxJer.column_3[0] + bPad) + ',' + (bboxJer.column_4[0] + bPad);
                }
            }
        } catch(e) {}
        // wmsViewRef is inside MapView — bbox resets on mount via the !v.bbox check
        setGraphTableData({
            edges: { records: [], headers: [], total: numEdges },
            nodes: { records: [], headers: ['NODE_NAME', 'NODE_LABEL'], total: 0 },
            edgeTable: activeGraph + ' (entities)',
            nodeTable: activeGraph + ' (entities/nodes)',
            identifierType: 'wkt',
            wmsMode: {
                table: edgeSourceTable.table, geoCol: geoCol, totalEdges: numEdges, bbox: wmsBbox,
                labelCol: edgeSourceTable.labelCol || null,
                edgeLabels: labelData && labelData.edge_labels ? labelData.edge_labels.map(function(l) { return (l.labels || []).join('|'); }) : [],
            },
        });
        setShowForceGraph(true);
    }, [activeGraph, credentials, edgeSourceTable, labelData]);
    useEffect(function() { setupWmsModeRef.current = setupWmsMode; }, [setupWmsMode]);

    /* Renderer-mode change handler:
       - 'wms'                  → setupWmsMode() (server-side, cheap)
       - 'auto' / 'deckgl' / 'mapview' → just switch mode; the user presses Pull+Visualize
                                  to actually fetch. The previous auto-pull path was
                                  too racy on fresh MapView mounts (chunks dropped while
                                  drawChunkRef.current was being set up), so we removed it. */
    // Stash for entity-mode graphTableData while we're temporarily in WMS, so
    // toggling DeckGL/Canvas ↔ WMS ↔ DeckGL/Canvas doesn't lose the already-
    // fetched nodes/edges. Cleared on graph switch (see loadGraphDetails).
    var preWmsDataRef = useRef(null);
    var handleChangeGeoRenderMode = useCallback(function(m) {
        // Deck.gl/WMS renderers hit un-neutralized Kinetica endpoints — never
        // switch into them outside Kinetica mode; force-graph Canvas stays put.
        if (engine !== 'kinetica' && (m === 'wms' || m === 'deckgl' || m === 'mapview')) return;
        setGeoRenderMode(m);
        if (m === 'wms') {
            // Save the entity-mode data (if any) before WMS overwrites graphTableData.
            if (graphTableData && !graphTableData.wmsMode) {
                preWmsDataRef.current = graphTableData;
            }
            setupWmsMode();
        } else if (graphTableData && graphTableData.wmsMode) {
            // Leaving WMS: restore the stashed entity data if we have it. The
            // WMS render shape (`wmsMode` payload) doesn't carry the parsed
            // nodes/edges, so without this restore the user would have to
            // Pull+Visualize again.
            if (preWmsDataRef.current) {
                setGraphTableData(preWmsDataRef.current);
                preWmsDataRef.current = null;
            } else {
                // Truly no prior entity data (user went straight to WMS first).
                // Clear so the placeholder + Pull+Visualize button shows.
                setGraphTableData(null);
                setShowForceGraph(false);

                // condition is `&& graphTableData`, so without this it'd unmount

                setMaximizedPanel(null);
