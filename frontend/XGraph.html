        }
    }, [graphTableData, setupWmsMode]);

    // No auto-fetch on mode change — user clicks Pull+Visualize

    /* Bidirectional picking: ontology SVG click → highlight table rows */
    var handleOntologyPick = useCallback(function(text) {
        if (!pickingEnabled || !text) return;
        var target = text.toLowerCase().replace(/\s+/g, '');
        document.querySelectorAll('tr[data-label]').forEach(function(row) {
            row.style.outline = ''; row.style.fontWeight = '';
            var rl = row.getAttribute('data-label').toLowerCase().replace(/\s+/g, '');
            if (target.includes(rl) || rl.includes(target)) {
                row.style.outline = '3px solid #0984e3';
                row.style.fontWeight = '700';
                row.scrollIntoView({ behavior:'smooth', block:'center' });
            }
        });
    }, [pickingEnabled]);

    /* Bidirectional picking: chart/table hover → highlight ontology SVG nodes/edges */
    var handleChartHoverLabels = useCallback(function(labels) {
        if (ontologyApiRef.current && ontologyApiRef.current.highlightOnGraph) {
            if (!pickingEnabled) {
                ontologyApiRef.current.highlightOnGraph(null);
            } else {
                ontologyApiRef.current.highlightOnGraph(labels);
            }
        }
    }, [pickingEnabled]);

    /* ResizeObserver: refit ontology on window resize */
    useEffect(function() {
        if (!mainContentRef.current) return;
        var ro = new ResizeObserver(function() {
            if (ontologyApiRef.current && ontologyApiRef.current.resetView) {
                ontologyApiRef.current.resetView(false);
            }
        });
        ro.observe(mainContentRef.current);
        return function() { ro.disconnect(); };
    }, []);

    /* Auto-refresh timer: label counts only */
    var autoRefreshTimerRef = useRef(null);
    var loadGraphDetailsRef = useRef(loadGraphDetails);
    var apiLoadingRef = useRef(api.loading);
    useEffect(function() { loadGraphDetailsRef.current = loadGraphDetails; }, [loadGraphDetails]);
    useEffect(function() { apiLoadingRef.current = api.loading; }, [api.loading]);
    useEffect(function() {
        if (autoRefreshTimerRef.current) clearInterval(autoRefreshTimerRef.current);
        autoRefreshTimerRef.current = null;
        if (!autoRefresh || !activeGraph || !credentials.url) return;
        autoRefreshTimerRef.current = setInterval(function() {
            if (!apiLoadingRef.current) loadGraphDetailsRef.current(activeGraph);
        }, autoInterval * 1000);
        return function() { if (autoRefreshTimerRef.current) clearInterval(autoRefreshTimerRef.current); };
    }, [autoRefresh, autoInterval, activeGraph, credentials.url]);

    /* ─── Session save/load ─── */
    var buildSession = function() {
        return {
            version: 1,
            savedAt: new Date().toISOString(),
            connection: { url: credentials.url, user: credentials.user },
            graph: {
                name: activeGraph || null,
                selectedNodeLabels: selectedNodeLabels,
                selectedEdgeLabels: selectedEdgeLabels,
                ontologyDot: showOntology && dotString ? dotString : null,
                dataFetched: !!graphTableData,
                showForceGraph: showForceGraph,
                canvasNodeLimit: canvasNodeLimit,
                canvasEdgeLimit: canvasEdgeLimit,
            },
            queries: queryPanels.map(function(panel) {
                var s = panel.stateRef && panel.stateRef.current;
                var h = s && s.helper ? s.helper : null;
                var kind = panel.createHelper ? 'create'
                         : panel.solveHelper ? 'solve'
                         : panel.matchHelper ? 'match'
                         : (panel.hideQueryHelper ? 'table' : 'query');
                // Persist the raw Run response only when its stringified size
                // is under the cap (default 2 MB). Over-cap panels are saved
                // *without* a cachedResult — on session load they restore
                // empty and the user re-runs manually (we explicitly DO NOT
                // auto-rerun, matching the existing solve/match restore-from-pill
                // behavior). The cap keeps JSON files small for big match
                // outputs while still resurrecting typical Query/Solve panels.
                var SESSION_RESULT_CAP = 2 * 1024 * 1024;  // 2 MB
                var cached = null;
                if (s && s.result) {
                    try {
                        var serialized = JSON.stringify(s.result);
                        if (serialized.length <= SESSION_RESULT_CAP) cached = s.result;
                    } catch(_e) {}
                }
                return { kind: kind, sql: s ? s.sql : panel.initialSql, activeTab: s ? s.activeTab : panel.initialTab, helper: h, cachedResult: cached };
            }).filter(function(q) {
                // Persist only panels that actually have user content for their kind.
                // Prevents an empty Query-Helper panel from being added during a session
                // load just because stateRef.current had a default empty helper object.
                if (q.kind === 'create') {
                    var ch = q.helper && q.helper.create;
                    if (!ch) return false;
                    if (ch.graphName && ch.graphName !== 'new_graph') return true;
                    if (ch.rows) {
                        for (var k in ch.rows) {
                            var arr = ch.rows[k] || [];
                            for (var i = 0; i < arr.length; i++) if (arr[i] && arr[i].value && String(arr[i].value).trim()) return true;
                        }
                    }
                    return false;
                }
                if (q.kind === 'table') {
                    // Table panels always carry their own SQL (SELECT * / DESCRIBE) — keep if SQL present.
                    return !!(q.sql && q.sql.trim());
                }
                if (q.kind === 'solve') {
                    // Solve panels: keep when SQL is present OR the helper has any rows/options.
                    if (q.sql && q.sql.trim()) return true;
                    var sh = q.helper && q.helper.solve;
                    if (sh && sh.rows) {
                        for (var sk in sh.rows) {
                            var sarr = sh.rows[sk] || [];
                            for (var si = 0; si < sarr.length; si++) if (sarr[si] && sarr[si].value && String(sarr[si].value).trim()) return true;
                        }
                    }
                    return false;
                }
                if (q.kind === 'match') {
                    // Match panels: same keep-rule shape as solve.
                    if (q.sql && q.sql.trim()) return true;
                    var mh = q.helper && q.helper.match;
                    if (mh && mh.rows) {
                        for (var mk in mh.rows) {
                            var marr = mh.rows[mk] || [];
                            for (var mi = 0; mi < marr.length; mi++) if (marr[mi] && marr[mi].value && String(marr[mi].value).trim()) return true;
                        }
                    }
                    return false;
                }
                // 'query' kind: keep when SQL is non-empty, OR Query Helper has selections.
                if (q.sql && q.sql.trim()) return true;
                var qh = q.helper || {};
                if ((qh.srcLabels && qh.srcLabels.length) || (qh.tgtLabels && qh.tgtLabels.length) ||
                    (qh.srcEntity && qh.srcEntity.trim()) || (qh.tgtEntity && qh.tgtEntity.trim()) ||
                    (qh.waypoints && qh.waypoints.length)) return true;
                return false;
            }),
        };
    };

    var saveSession = function() {
        var session = buildSession();
        var blob = new Blob([JSON.stringify(session, null, 2)], { type: 'application/json' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        var now = new Date();
        var ts = String(now.getFullYear()) + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '_' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0');
        a.download = (activeGraph || 'session').replace(/\./g, '_') + '_session_' + ts + '.json';
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('\u2705 Session saved: ' + a.download, 'success');
    };

    var loadSession = function(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            try {
                var session = JSON.parse(e.target.result);
                if (!session || session.version !== 1) { showToast('274C Invalid session file.', 'error'); return; }

                // Warn if session was saved from a different server
                var sessionServer = session.connection && session.connection.url;
                if (sessionServer && credentials.url && sessionServer !== credentials.url) {
                    showToast('\u26A0\uFE0F Session from "' + sessionServer + '" — loading on current server "' + credentials.url + '"', 'warn');
                }

                // Clear existing canvas visualization before restoring
                setGraphTableData(null); setShowForceGraph(false);

                // Use the active connection (don't reconnect to session's server)
                var restoreGraph = function() {
                    if (!session.graph || !session.graph.name) return;
                    var graphName = session.graph.name;

                    // Resolve saved name against the live graph list. Unqualified names
                    // (e.g., 'new_graph') resolve to the user's default schema on the
                    // server side — try matching by suffix '.<name>' so saved 'new_graph'
                    // finds live 'ki_home.new_graph', and vice versa.
                    if (graphs.indexOf(graphName) === -1) {
                        var _resolved = null;
                        for (var _gi = 0; _gi < graphs.length; _gi++) {
                            var _g = graphs[_gi];
                            if (_g === graphName || _g.indexOf('.' + graphName) === _g.length - graphName.length - 1 || graphName.indexOf('.' + _g) === graphName.length - _g.length - 1) { _resolved = _g; break; }
                        }
                        if (_resolved) { graphName = _resolved; }
                    }
                    // Check if graph exists on current server
                    if (graphs.indexOf(graphName) === -1) {
                        showToast('\u274C Graph "' + graphName + '" not found. Available: ' + (graphs.length > 0 ? graphs.join(', ') : 'none'), 'error');
                        // Still restore query panels (SQL text may be useful)
                        if (session.queries && session.queries.length > 0) {
                            var panels = session.queries.map(function(q) {
                                queryIdCounter.current++;
                                var isCreate = q.kind === 'create' || !!q.createHelper;
                                var isSolve = q.kind === 'solve' || !!q.solveHelper;
                                var isMatch = q.kind === 'match' || !!q.matchHelper;
                                var isTable = q.kind === 'table';
                                return { id: queryIdCounter.current, initialSql: q.sql || '', initialTab: null, stateRef: { current: null }, autoRun: false, initialHelper: q.helper || null, initialResult: q.cachedResult || null, createHelper: isCreate, solveHelper: isSolve, matchHelper: isMatch, hideQueryHelper: isCreate || isSolve || isMatch || isTable };
                            });
                            setQueryPanels(panels);
                        }
                        return;
                    }

                    loadGraphDetails(graphName).then(function(gt) {
                        // Restore label selections
                        if (session.graph.selectedNodeLabels) setSelectedNodeLabels(session.graph.selectedNodeLabels);
                        if (session.graph.selectedEdgeLabels) setSelectedEdgeLabels(session.graph.selectedEdgeLabels);
                        // Restore ontology
                        if (session.graph.ontologyDot) { setDotString(session.graph.ontologyDot); setShowOntology(true); }
                        // Restore data fetch + visualization
                        if (session.graph.dataFetched) {
                            fetchGraphData(graphName).then(function() {
                                if (session.graph.showForceGraph) setShowForceGraph(true);
                                if (session.graph.canvasNodeLimit) setCanvasNodeLimit(session.graph.canvasNodeLimit);
                                if (session.graph.canvasEdgeLimit) setCanvasEdgeLimit(session.graph.canvasEdgeLimit);
                            });
                        }
                        // Restore query panels
                        if (session.queries && session.queries.length > 0) {
                            var panels = session.queries.map(function(q) {
                                queryIdCounter.current++;
                                var isCreate = q.kind === 'create' || !!q.createHelper;
                                var isSolve = q.kind === 'solve' || !!q.solveHelper;
                                var isMatch = q.kind === 'match' || !!q.matchHelper;
                                var isTable = q.kind === 'table';
                                var hasCached = !!q.cachedResult;
                                // If we persisted a result under the size cap, restore it directly
                                // and skip auto-rerun. If not (over-cap), keep the existing rule:
                                // Query/Table auto-rerun, Create/Solve/Match wait for user click.
                                var autoRunOnRestore = hasCached ? false : ((isCreate || isSolve || isMatch) ? false : autoRunQueries);
                                return { id: queryIdCounter.current, initialSql: q.sql || '', initialTab: q.activeTab || null, stateRef: { current: null }, autoRun: autoRunOnRestore, initialHelper: q.helper || null, initialResult: q.cachedResult || null, createHelper: isCreate, solveHelper: isSolve, matchHelper: isMatch, hideQueryHelper: isCreate || isSolve || isMatch || isTable };
                            });
                            setQueryPanels(panels);
                        }
                    });
                };

                // If not connected yet, connect first then restore. Old session files
                // predate the engine/gateway model and only carry a Kinetica {url,user};
                // there's no way to recover an engine/base from that, so just reuse the
                // current gateway connection (default engine 'falkordb') rather than
                // calling handleConnect with the stale {url,user,pass} shape.
                if (!credentials.url && sessionServer) {
                    handleConnect({ engine: engine || 'falkordb', base: gatewayBase }).then(restoreGraph);
                } else {
                    restoreGraph();
                }
            } catch(err) { showToast('274C Error loading session: ' + err.message, 'error'); }
        };
        reader.readAsText(file);
    };

    // Session change confirmation — stores pending action, shows banner
    const [sessionChangePrompt, setSessionChangePrompt] = useState(null); // null or { action: function }

    var confirmSessionChange = function(action) {
        if (!activeGraph || !labelData) { action(); return; }
        setSessionChangePrompt({ action: action });
    };

    var hasDashboard = !!labelData;

    // Node-label distribution for the Visualize action's LabelChart donut.
    // `labelData` from getSchema is just `{labels:[{label}]}` — no counts —
    // so we derive a real per-label count from the loaded graphTableData
    // .nodes.records instead (each record carries NODE_LABEL; see
    // gateway.js graphTableFromGateway).
    var nodeLabelDistribution = useMemo(function() {
        var counts = {}, total = 0;
        if (graphTableData && graphTableData.nodes && graphTableData.nodes.records) {
            var headers = graphTableData.nodes.headers || [];
            var colLabel = resolveCol(headers, ["NODE_LABEL"]) || "NODE_LABEL";
            graphTableData.nodes.records.forEach(function(rec) {
                var raw = rec[colLabel];
                var label = raw == null || raw === '' ? '(none)' : String(raw);
                counts[label] = (counts[label] || 0) + 1;
                total += 1;
            });
        }
        var items = Object.keys(counts).map(function(label) { return { labels: [label], count: counts[label] }; });
        return { items: items, total: total };
    }, [graphTableData]);

    // Edge-label distribution — same derivation as nodeLabelDistribution above,
    // but from graphTableData.edges.records (each carries EDGE_LABEL; see
    // gateway.js graphTableFromGateway). Feeds the second (edge) LabelChart
    // donut on the Visualize action.
    var edgeLabelDistribution = useMemo(function() {
        var counts = {}, total = 0;
        if (graphTableData && graphTableData.edges && graphTableData.edges.records) {
            var headers = graphTableData.edges.headers || [];
            var colLabel = resolveCol(headers, ["EDGE_LABEL"]) || "EDGE_LABEL";
            graphTableData.edges.records.forEach(function(rec) {
                var raw = rec[colLabel];
                var label = raw == null || raw === '' ? '(none)' : String(raw);
                counts[label] = (counts[label] || 0) + 1;
                total += 1;
            });
        }
        var items = Object.keys(counts).map(function(label) { return { labels: [label], count: counts[label] }; });
        return { items: items, total: total };
    }, [graphTableData]);

    // Visualize owns entity loading: progressively pages nodes/edges in from
    // the gateway (VISUALIZE_PAGE_SIZE per request, up to the bigGraphThreshold
    // "Max load" cap) so the canvas starts rendering after the first page
    // instead of blocking on the whole fetch. This is wired as CanvasGraph's
    // own onVisualize/vizLoading props, so CanvasGraph's built-in
    // "Pull+Visualize" button/spinner IS the load/refresh control — there's
    // no separate button in this panel. `vizProgress.loading` doubles as the
    // plain boolean CanvasGraph expects for vizLoading; errors surface in the
    // no-data placeholder since CanvasGraph itself has no error slot.
    const [vizLoadError, setVizLoadError] = useState(null);
    const [vizProgress, setVizProgress] = useState({ loaded: 0, total: 0, loading: false });
    // `loadAll` must be the exact boolean `true` (not just truthy) — both the
    // normal Load/Refresh button here and CanvasGraph's own built-in
    // "Pull+Visualize" button wire this handler straight to a DOM onClick,
    // which invokes it with the click SyntheticEvent as the first arg; a
    // loose truthy check would make every ordinary click load the full
    // uncapped graph. Only the "Continue — load all" button below passes
    // `true` explicitly.
    var handleVisualizeLoad = useCallback(async function(loadAll) {
        if (!activeGraph || !gwClient) return;
        setVizLoadError(null);
        var allNodes = [];
        var allEdges = [];
        var target = loadAll === true ? (graphCounts.nodes || bigGraphThreshold) : Math.min(graphCounts.nodes || bigGraphThreshold, bigGraphThreshold);
        setVizProgress({ loaded: 0, total: target, loading: true });
        try {
            var offset = 0;
            while (offset < target) {
                var page = await gwClient.fetchEntities(activeGraph, VISUALIZE_PAGE_SIZE, offset);
                var pageNodes = (page && page.nodes) || [];
                var pageEdges = (page && page.edges) || [];
                if (pageNodes.length === 0 && pageEdges.length === 0) break;   // end of data
                allNodes = allNodes.concat(pageNodes);
                allEdges = allEdges.concat(pageEdges);
                // Do NOT redraw the canvas per batch: a force-directed layout
                // re-solves on every data change, so streaming batches into it
                // makes social (non-geo) graphs flash/jitter during the load.
                // Only advance the progress bar here; the canvas is drawn ONCE
                // after the full load completes (below), so the layout solves once.
                setVizProgress({ loaded: allNodes.length, total: target, loading: true });
                // Yield a macrotask so the progress bar repaints between fetches.
                await new Promise(function(r){ setTimeout(r, 0); });
                offset += VISUALIZE_PAGE_SIZE;
            }
            // Feed CanvasGraph the REAL total node/edge counts (not the
            // accumulated page length) so its big-graph-threshold comparison
            // and "N of TOTAL" indicator are accurate.
            var gt = window.xgraphGateway.graphTableFromGateway({ nodes: allNodes, edges: allEdges });
            if (typeof graphCounts.nodes === 'number') gt.nodes.total = graphCounts.nodes;
            if (typeof graphCounts.edges === 'number') gt.edges.total = graphCounts.edges;
            setGraphTableData(gt);
        } catch (err) {
            setVizLoadError(err.message);
        } finally {
            setVizProgress(function(p) { return Object.assign({}, p, { loading: false }); });
        }
    }, [activeGraph, gwClient, graphCounts, bigGraphThreshold]);

    // Label-selective filtering for Visualize: clicking a LabelChart slice/row
    // toggles that label combo in/out of selectedNodeLabels or
    // selectedEdgeLabels, which CanvasGraph uses to filter what it renders.
    var toggleSelectedNodeLabel = function(comboKey) {
        setSelectedNodeLabels(function(prev) {
            return prev.indexOf(comboKey) !== -1 ? prev.filter(function(l){ return l !== comboKey; }) : prev.concat([comboKey]);
        });
    };
    var toggleSelectedEdgeLabel = function(comboKey) {
        setSelectedEdgeLabels(function(prev) {
            return prev.indexOf(comboKey) !== -1 ? prev.filter(function(l){ return l !== comboKey; }) : prev.concat([comboKey]);
        });
    };

    return (
        <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
            {/* Toast — `toast`/`showToast` already existed (used by the lite
                session Save/Load below, plus the older delete/modify/WMS
                flows) but had no rendered consumer anywhere in this file;
                this is the minimal fixed-position renderer for it. */}
            {toast && (
                <div style={{
                    position:'fixed', top:16, right:16, zIndex:9999, padding:'10px 16px', borderRadius:8,
                    fontSize:13, fontWeight:600, color:'#fff', maxWidth:420, boxShadow:'0 4px 16px rgba(0,0,0,0.15)',
                    background: toast.type === 'error' ? '#d63031' : toast.type === 'warn' ? '#e17055' : toast.type === 'success' ? '#00b894' : '#0984e3',
                }}>{toast.message}</div>
            )}
            {/* Header / wordmark + ActionBar on ONE row — the sidebar that used
                to carry the wordmark is gone; logo+wordmark sit on the left,
                the action-bar buttons flow inline to their right so the nav
                no longer costs its own vertical row. */}
            <div style={{ display:'flex', alignItems:'center', gap:16, padding:'10px 16px', background:'#fff', borderBottom:'1px solid #dfe6e9', flexShrink:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
                    <img src="logo.svg" style={{ height:28, width:'auto' }} alt="Logo" onError={function(e){ e.target.style.display='none'; }} />
                    <span style={{ fontWeight:700, fontSize:17, color:'#0984e3', letterSpacing:-0.3 }}>xGraph</span>
                    <span style={{ fontSize:13, color:'#b2bec3', fontWeight:700 }}>v{EXPLORER_VERSION}</span>
                </div>
                <ActionBar activeAction={activeAction} onSelect={setActiveAction} state={{ graphs: graphs, activeGraph: activeGraph, connected: connected }} />
                {/* Lightweight session Save/Load — Setup + query tabs only (no
                    graph viz data, no password/apiKey). Pinned to the far
                    right of the header row. */}
                <div style={{ display:'flex', alignItems:'center', gap:8, marginLeft:'auto', flexShrink:0 }}>
                    <button onClick={saveLiteSession} title="Save Setup + query tabs to a JSON file (passwords/API keys excluded)" style={{
                        padding:'6px 10px', border:'1px solid #dfe6e9', borderRadius:6, cursor:'pointer',
                        fontSize:12, fontWeight:700, color:'#2d3436', background:'#fff',
                    }}>{'💾'} Save</button>
                    <button onClick={function(){ if (liteSessionFileInputRef.current) liteSessionFileInputRef.current.click(); }} title="Load a saved Setup + query tabs session" style={{
                        padding:'6px 10px', border:'1px solid #dfe6e9', borderRadius:6, cursor:'pointer',
                        fontSize:12, fontWeight:700, color:'#2d3436', background:'#fff',
                    }}>{'📂'} Load</button>
                    <input ref={liteSessionFileInputRef} type="file" accept=".json,application/json" style={{ display:'none' }}
                        onChange={function(e){ if (e.target.files[0]) { loadLiteSession(e.target.files[0]); e.target.value = ''; } }} />
                </div>
            </div>

            {/* Summary one-liner — graph name + live counts from the gateway
                schema (graphCounts/labelData), populated as soon as a graph
                becomes active (see the loadSchema effect above). Thin/muted,
                spans the full width, sits below the header row. */}
            {(connected || activeGraph) && (
                <div style={{ flexShrink:0, padding:'4px 16px', fontSize:11, color:'#636e72', background:'#fafbfc', borderBottom:'1px solid #eee', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                    {/* Connection info (folded in from the old Connect tab) */}
                    <span title={connected ? 'Connected' : 'Not connected'} style={{ color: connected ? '#00b894' : '#b2bec3', fontWeight:700 }}>{'●'}</span>
                    <span style={{ marginLeft:5, color:'#2d3436', fontWeight:700 }}>{graphEngine}</span>
                    <span style={{ margin:'0 6px', color:'#dfe6e9' }}>{'·'}</span>
                    <span title="Gateway URL">{gatewayBase}</span>
                    {activeGraph && (
                        <span>
                            <span style={{ margin:'0 6px', color:'#dfe6e9' }}>{'·'}</span>
                            <strong style={{ color:'#2d3436', fontWeight:700 }}>{activeGraph}</strong>
                            <span style={{ margin:'0 6px', color:'#dfe6e9' }}>{'·'}</span>
                            {(graphCounts.nodes || 0).toLocaleString()} nodes
                            <span style={{ margin:'0 6px', color:'#dfe6e9' }}>{'·'}</span>
                            {(graphCounts.edges || 0).toLocaleString()} edges
                            <span style={{ margin:'0 6px', color:'#dfe6e9' }}>{'·'}</span>
                            {((labelData && labelData.node_labels) || []).length} node labels
                            <span style={{ margin:'0 6px', color:'#dfe6e9' }}>{'·'}</span>
                            {((labelData && labelData.edge_labels) || []).length} edge labels
                        </span>
                    )}
                </div>
            )}

            {/* Content region — switches on activeAction. Setup/Connect/List are
                simple centered cards; Query/Visualize/Ontology mount the existing
                QueryPanel/CanvasGraph/OntologyViewer/LabelChart components
                full-size; Interact①/② are stubs until the LLM wiring lands.
                There is no Load action: schema (labels/rel types/counts) is
                fetched as soon as a graph becomes active, and Visualize owns
                entity loading via CanvasGraph's own built-in Load/Refresh
                button (onVisualize/vizLoading) since only it needs the
                actual node/edge rows. */}
            <div style={{ flex:1, minHeight:0, overflow:'auto', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
                {activeAction === 'setup' && (
                    <SetupPanel
                        graphEngine={graphEngine} setGraphEngine={setGraphEngine}
                        graphConn={graphConn} setGraphConn={setGraphConn}
                        olapEngine={olapEngine} setOlapEngine={setOlapEngine}
                        olapConn={olapConn} setOlapConn={setOlapConn}
                        llmConn={llmConn} setLlmConn={setLlmConn}
                        gatewayBase={gatewayBase} setGatewayBase={setGatewayBase}
                        onConnect={handleConnectAxes} connectStatus={connectStatus}
                    />
                )}
                {activeAction === 'build' && (
                    <BuildPanel
                        extractProps={{
                            gwClient: gwClient, setGraphs: setGraphs,
                            setActiveGraph: setActiveGraph, setActiveAction: setActiveAction,
                            extractSources: extractSources, setExtractSources: setExtractSources,
                            extractGraph: extractGraph, setExtractGraph: setExtractGraph,
                            graphEngine: graphEngine,
                            onGraphUpdated: refreshGraph,
                        }}
                        createProps={{
                            graphEngine: graphEngine, gwClient: gwClient,
                            setGraphs: setGraphs, setActiveAction: setActiveAction,
                            createGraphName: createGraphName, setCreateGraphName: setCreateGraphName,
                            createNodeTable: createNodeTable, setCreateNodeTable: setCreateNodeTable,
                            createNodeFile: createNodeFile, setCreateNodeFile: setCreateNodeFile,
                            createNodeSql: createNodeSql, setCreateNodeSql: setCreateNodeSql,
                            createNodeIdCol: createNodeIdCol, setCreateNodeIdCol: setCreateNodeIdCol,
                            createNodeLabelCol: createNodeLabelCol, setCreateNodeLabelCol: setCreateNodeLabelCol,
                            createNodeProps: createNodeProps, setCreateNodeProps: setCreateNodeProps,
                            createEdgeTable: createEdgeTable, setCreateEdgeTable: setCreateEdgeTable,
                            createEdgeFile: createEdgeFile, setCreateEdgeFile: setCreateEdgeFile,
                            createEdgeSql: createEdgeSql, setCreateEdgeSql: setCreateEdgeSql,
                            createEdgeIdCol: createEdgeIdCol, setCreateEdgeIdCol: setCreateEdgeIdCol,
                            createEdgeSrcCol: createEdgeSrcCol, setCreateEdgeSrcCol: setCreateEdgeSrcCol,
                            createEdgeTgtCol: createEdgeTgtCol, setCreateEdgeTgtCol: setCreateEdgeTgtCol,
                            createEdgeTypeCol: createEdgeTypeCol, setCreateEdgeTypeCol: setCreateEdgeTypeCol,
                            createDdl: createDdl, setCreateDdl: setCreateDdl,
                            activeGraph: activeGraph, extractSources: extractSources,
                            createHistory: createHistory, onCreated: recordCreate,
                            graphGrammar: (graphEngine === 'kinetica' ? graphGrammar : DUCKDB_GRAMMAR), tables: tables,
                            tableColumnsCache: tableColumnsCache, onFetchTableColumns: fetchTableColumnsGW,
                            onRegisterFile: registerFileGW,
                        }}
                    />
                )}
                {activeAction === 'list' && (
                    <ListPanel
                        graphs={graphs} activeGraph={activeGraph} graphSizes={graphSizes}
                        gwClient={gwClient}
                        onSelectGraph={function(name){ setActiveGraph(name); setActiveAction('ontology'); }}
                        onDeleteGraph={handleDeleteGraph}
                    />
                )}
                {activeAction === 'storage' && (
                    <StoragePanel gwClient={gwClient} activeGraph={activeGraph} />
                )}
                {activeAction === 'interact1' && (
                    <InteractAskPanel
                        gwClient={gwClient} activeGraph={activeGraph} labelData={labelData}
                        onRunInQuery={function(cypher){ addQueryTab(cypher); setActiveAction('query'); }}
                        askHistory={askHistory} setAskHistory={setAskHistory}
                        graphEngine={graphEngine}
                    />
                )}
                {/* Query area — outer wrapper is a COLUMN so the tab strip
                    sits as a thin full-width row ACROSS THE TOP and the
                    QueryPanel(s) fill the remaining height below it (was
                    previously a bare row sibling of the strip inside this
                    content region's default flex-row layout, which put the
                    strip to the LEFT of the query window). Hidden (not
                    unmounted) via display:none when the Query action isn't
                    on screen, so it never competes for row space with the
                    other action panels, and so each tab's local state/results
                    survive switching away and back. */}
                {!!activeGraph && (
                    <div style={{ display: activeAction === 'query' ? 'flex' : 'none', flexDirection:'column', flex:1, width:'100%', minHeight:0, alignSelf:'stretch' }}>
                        {/* Query tab strip — thin/compact, matches the info-line
                            style above. One chip per queryTabs id (active one
                            accent-filled), plus a + button to add another tab
                            via addQueryTab. Full-width row above the panels. */}
                        <div style={{ flexShrink:0, display:'flex', alignItems:'center', gap:4, padding:'4px 16px', fontSize:11, background:'#fafbfc', borderBottom:'1px solid #eee' }}>
                            {queryTabs.map(function(id) {
                                var isActive = activeQueryTab === id;
                                return (
                                    <div key={id} onClick={function(){ setActiveQueryTab(id); }} style={{
                                        display:'flex', alignItems:'center', gap:4, cursor:'pointer', padding:'2px 8px', borderRadius:4,
                                        fontWeight: isActive ? 700 : 400,
                                        background: isActive ? '#0984e3' : '#eef2f7',
                                        color: isActive ? '#fff' : '#2d3436',
                                    }}>
                                        <span>{id}</span>
                                        {queryTabs.length > 1 && (
                                            <span onClick={function(e){ e.stopPropagation(); removeQueryTab(id); }} title={"Close " + id} style={{
                                                marginLeft:2, opacity:0.7, fontWeight:700, lineHeight:1,
                                            }}>{'✕'}</span>
                                        )}
                                    </div>
                                );
                            })}
                            <div onClick={addQueryTab} title="New query tab" style={{
                                cursor:'pointer', padding:'2px 8px', borderRadius:4, fontWeight:700,
                                background:'#eef2f7', color:'#0984e3',
                            }}>{'+'}</div>
                        </div>
                        {/* Kept mounted at all times (once a graph is active) so
                            each tab's Query Helper local state (selected labels,
                            stops, etc.) and query text/results survive switching
                            to another action tab and back, AND survive switching
                            between query tabs — display:none (not conditional
                            rendering) hides it without unmounting. One keyed
                            <QueryPanel> per queryTabs id. Fills the row below
                            the tab strip. */}
                        <div style={{ flex:1, display:'flex', flexDirection:'column', width:'100%', minHeight:0 }}>
                            {queryTabs.map(function(id) {
                                if (!queryTabStateRefs.current[id]) queryTabStateRefs.current[id] = { current: null };
                                return (
                                    <div key={id} style={{ display: activeQueryTab === id ? 'flex' : 'none', flex:1, flexDirection:'column', width:'100%', minHeight:0, alignSelf:'stretch' }}>
                                        <QueryPanel
                                            gwClient={gwClient} graphName={activeGraph} activeGraph={activeGraph}
                                            credentials={credentials} labelData={labelData} dotString={dotString}
                                            graphDirected={graphDirected} nodeSourceTable={nodeSourceTable}
                                            tables={tables} graphGrammar={graphGrammar} endpointGrammar={endpointGrammar}
                                            tableColumnsCache={tableColumnsCache} onFetchTableColumns={fetchTableColumns}
                                            panelIndex={0} onClose={function(){}} embedded={true}
                                            engine={engine}
                                            initialSql={queryTabSql[id] || ''}
                                            initialHelper={queryTabHelper[id] || null}
                                            stateRef={queryTabStateRefs.current[id]}
                                            onSqlChange={function(v){ setQueryTabSql(function(m){ var n = Object.assign({}, m); n[id] = v; return n; }); }}
                                            onResultChange={function(res){ setQueryTabResult(function(m){ var n = Object.assign({}, m); n[id] = res; return n; }); }}
                                        />
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                )}
                {activeAction === 'interact2' && (
                    <InteractExplainPanel
                        gwClient={gwClient} activeGraph={activeGraph}
                        sql={queryTabSql[activeQueryTab]} result={queryTabResult[activeQueryTab]}
                    />
                )}
                {activeAction === 'visualize' && (
                    <div style={{ width:'100%', height:'100%', alignSelf:'stretch', display:'flex', flexDirection:'column', gap:6, minHeight:0 }}>
                        {/* Compact single-line control strip (small font, like the
                            graph-info/summary line) — Max-load field, the Load/Refresh
                            trigger, and the progress bar+counter all share one thin
                            row so the CanvasGraph below gets the vertical space back.
                            CanvasGraph's own built-in "↻ Pull+Visualize" button/sliders
                            still exist for in-canvas control; this strip is what's
                            visible before the first load too (there's nothing to mount
                            CanvasGraph on yet).

                            The big-graph warning itself is driven from HERE (panel
                            level), not from CanvasGraph — CanvasGraph never reads
                            `.total`/compares `bigGraphThreshold` to anything, so a
                            banner fed by graphCounts (the REAL full-graph size from
                            getSchema) vs bigGraphThreshold is the only thing that
                            actually fires. It's visible both before and after Load,
                            any time the true counts exceed the threshold. */}
                        <div style={{ flexShrink:0, display:'flex', alignItems:'center', gap:8, fontSize:11, color:'#636e72' }}>
                            <label style={{ fontWeight:600, display:'flex', alignItems:'center', gap:5, flexShrink:0 }}>
                                Max load
                                <input type="number" min="1" value={bigGraphThreshold} onChange={function(e){
                                    var v = parseInt(e.target.value, 10);
                                    setBigGraphThreshold(isNaN(v) ? 0 : v);
                                }} style={{ width:80, fontSize:11, padding:'2px 5px', border:'1px solid #dfe6e9', borderRadius:4, fontFamily:'inherit' }} />
                            </label>
                            <button onClick={function(){ handleVisualizeLoad(); }} disabled={!activeGraph || vizProgress.loading} style={{
                                padding:'3px 10px', border:'none', borderRadius:4, cursor: (!activeGraph || vizProgress.loading) ? 'not-allowed' : 'pointer',
                                fontWeight:700, color:'#fff', fontSize:11, fontFamily:'inherit', flexShrink:0,
                                background: (!activeGraph || vizProgress.loading) ? '#74b9ff' : 'linear-gradient(135deg,#0984e3,#0872c4)',
                            }}>{vizProgress.loading ? 'Loading…' : (graphTableData ? 'Refresh' : 'Load')}</button>
                            {(vizProgress.loading || vizProgress.total > 0) && (
                                <React.Fragment>
                                    <div style={{ height:4, width:100, flexShrink:0, background:'#eee', borderRadius:2, overflow:'hidden' }}>
                                        <div style={{
                                            height:'100%',
                                            width: (vizProgress.total > 0 ? Math.min(100, (vizProgress.loaded / vizProgress.total) * 100) : 0) + '%',
                                            background: vizProgress.loading ? '#0984e3' : '#00b894',
                                            transition:'width 0.2s',
                                        }} />
                                    </div>
                                    <span style={{ whiteSpace:'nowrap' }}>{vizProgress.loaded.toLocaleString()} / {vizProgress.total.toLocaleString()} loaded</span>
                                </React.Fragment>
                            )}
                            {vizLoadError && <span style={{ color:'#d63031', fontWeight:600 }}>{vizLoadError}</span>}
                        </div>
                        {(graphCounts.nodes > bigGraphThreshold || graphCounts.edges > bigGraphThreshold) && (
                            <div style={{ flexShrink:0, padding:'4px 10px', background:'#fff3cd', color:'#856404', border:'1px solid #ffeeba', borderRadius:5, fontSize:11, fontWeight:600, display:'flex', alignItems:'center', flexWrap:'wrap', gap:6 }}>
                                <span>
                                    {'⚠ Large graph: ' + graphCounts.nodes.toLocaleString() + ' nodes / ' + graphCounts.edges.toLocaleString() +
                                     ' edges exceed the ' + bigGraphThreshold.toLocaleString() + ' max-load cap — loading progressively.'}
                                </span>
                                <button onClick={function(){ handleVisualizeLoad(true); }} disabled={!activeGraph || vizProgress.loading} title="Load every node/edge, ignoring the max-load cap" style={{
                                    padding:'2px 8px', border:'1px solid #856404', borderRadius:4, cursor: (!activeGraph || vizProgress.loading) ? 'not-allowed' : 'pointer',
                                    fontWeight:700, color:'#856404', background:'#fff', fontSize:10, fontFamily:'inherit', opacity: (!activeGraph || vizProgress.loading) ? 0.5 : 1, flexShrink:0, whiteSpace:'nowrap',
                                }}>Continue — load all</button>
                            </div>
                        )}
                        {graphTableData ? (
                            <div style={{ flex:1, minHeight:0, display:'flex', gap:16 }}>
                                {/* minWidth:0 is load-bearing: a picked node renders CanvasGraph's
                                    wide node-detail table (esp. Kinetica records with many address:*
                                    columns). Without it this flex:2 pane's default min-width:auto lets
                                    that table's min-content width force the pane to full width, squeezing
                                    the flex:1 donut column to zero (donuts vanish). minWidth:0 lets the
                                    pane shrink to its 2/3 share so the inner table's overflowX:auto scrolls. */}
                                <div style={{ flex:2, minWidth:0, minHeight:0, display:'flex' }}>
                                    <CanvasGraph
                                        data={graphTableData} graphName={activeGraph} gwClient={gwClient}
                                        credentials={credentials} nodeSourceTable={nodeSourceTable} labelData={labelData}
                                        selectedNodeLabels={selectedNodeLabels} selectedEdgeLabels={selectedEdgeLabels}
                                        nodeLimit={canvasNodeLimit} onNodeLimitChange={setCanvasNodeLimit}
                                        edgeLimit={canvasEdgeLimit} onEdgeLimitChange={setCanvasEdgeLimit}
                                        bigGraphThreshold={bigGraphThreshold} onChangeBigGraphThreshold={setBigGraphThreshold}
                                        onVisualize={handleVisualizeLoad} vizLoading={vizProgress.loading}
                                    />
                                </div>
                                <div style={{ flex:1, minWidth:0, minHeight:0, display:'flex', flexDirection:'column', gap:16 }}>
                                    <LabelChart
                                        title="Nodes by Label" items={nodeLabelDistribution.items} total={nodeLabelDistribution.total}
                                        pickingEnabled={true} selectedLabels={selectedNodeLabels} onToggleLabel={toggleSelectedNodeLabel}
                                    />
                                    <LabelChart
                                        title="Edges by Label" items={edgeLabelDistribution.items} total={edgeLabelDistribution.total}
                                        pickingEnabled={true} selectedLabels={selectedEdgeLabels} onToggleLabel={toggleSelectedEdgeLabel}
                                    />
                                </div>
                            </div>
                        ) : (
                            <div style={{ textAlign:'center', color:'#636e72', margin:'auto' }}>
                                <h2 style={{ fontWeight:700, fontSize:20, margin:'0 0 8px' }}>Visualize</h2>
                                <p style={{ fontSize:14, color:'#b2bec3' }}>Use the Load button above to fetch this graph's nodes/edges and render it.</p>
                            </div>
                        )}
                    </div>
                )}
                {activeAction === 'ontology' && (
                    <div style={{ width:'100%', height:'100%', alignSelf:'stretch', display:'flex', minHeight:0 }}>
                        <OntologyViewer
                            dotString={dotString} pickingEnabled={pickingEnabled}
                            onPickLabel={handleOntologyPick} apiRef={ontologyApiRef}
                            schemaFullSearch={schemaFullSearch} onToggleSchemaFullSearch={function(){setSchemaFullSearch(function(p){return !p;});}}
                            schemaNodeLabelkeys={schemaNodeLabelkeys} onToggleSchemaNodeLabelkeys={function(){setSchemaNodeLabelkeys(function(p){return !p;});}}
                            schemaEdgeLabelkeys={schemaEdgeLabelkeys} onToggleSchemaEdgeLabelkeys={function(){setSchemaEdgeLabelkeys(function(p){return !p;});}}
                        />
                    </div>
                )}
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
